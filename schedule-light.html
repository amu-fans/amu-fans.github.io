<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あむちゃんスケジュール</title>
<!-- ★追加: 画像保存機能のためのライブラリを再度読み込み -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ==================================================
     ベース設定（全体版と同じカラー・フォント）
  ================================================== */
  :root {
    --main-pink: #ff2a7a;
    --text-black: #111111;
    --bg-white: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ★追加: 全体スクロールを禁止し、アドレスバーの伸縮を封印する */
  html, body {
    height: 100%;
    overflow: hidden; 
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    color: var(--text-black);
    background-color: var(--bg-white);
    max-width: 768px; /* ★追加: 横幅を768pxに制限 */
    margin: 0 auto;   /* ★追加: 中央寄せ */
  }

  .no-scroll {
    overflow: hidden;
  }

  /* ==================================================
     ヘッダー＆メニュー周り（全体版と共通化）
     ※HTML本体は外部ファイル化しましたが、CSSはここで設定しておきます
  ================================================== */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;       /* ★追加: 中央寄せのために必要 */
    margin: 0 auto; /* ★追加: 中央寄せ */
    width: 100%;
    max-width: 768px; /* ★追加: 横幅固定 */
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 1100;
    background-color: var(--main-pink);
  }

  .site-logo {
    font-size: 13px;
    font-weight: bold;
    color: var(--bg-white);
    text-decoration: none;
    z-index: 1001;
    line-height: 1.3;
    max-width: calc(100% - 50px);
  }

  .hamburger {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
  }

  .hamburger span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: var(--bg-white);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .hamburger span:nth-child(3) { bottom: 0; }

  .hamburger.active span:nth-child(1) {
    top: 50%;
    transform: translateY(-50%) rotate(45deg);
    background-color: var(--bg-white);
  }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) {
    bottom: 50%;
    transform: translateY(50%) rotate(-45deg);
    background-color: var(--bg-white);
  }

  .global-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;       /* ★追加: 中央寄せのために必要 */
    margin: 0 auto; /* ★追加: 中央寄せ */
    width: 100vw;
    max-width: 768px; /* ★追加: 横幅固定 */
    height: 100vh;
    background-color: var(--bg-white);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 100px;
    align-items: center;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  .global-nav.active {
    transform: translateX(0);
  }

  .nav-list {
    list-style: none;
    text-align: center;
  }

  .nav-list li {
    margin: 25px 0;
  }

  .nav-list a {
    color: var(--text-black);
    text-decoration: none;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 2px;
    display: block;
  }

  .nav-list span {
    display: block;
    font-size: 12px;
    font-weight: normal;
    margin-top: 5px;
    opacity: 0.8;
  }

  /* ページ全体のラッパー（ヘッダー分の余白を確保） */
  .page-wrapper {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* スマホ画面の高さにピタッと合わせる */
    padding-top: 60px; /* 共通ヘッダーの高さ分下げる */
  }

  /* 上部に固定するエリア */
  .sticky-top-area {
    flex-shrink: 0; /* 高さを維持して縮ませない */
    background-color: var(--bg-white);
    z-index: 100;
    padding: 10px 10px 0; /* ★上部余白をギリギリの10pxに調整 */
  }

  .page-title {
    text-align: center;
    font-size: 32px; /* 文字サイズはそのまま維持 */
    font-weight: 900;
    color: var(--text-black);
    text-shadow: 1px 1px 0 var(--bg-white), 2px 2px 0 var(--bg-white), 3px 3px 0 var(--bg-white);
    margin-bottom: 5px; /* ★下の隙間を限界まで詰める */
    display: inline-block;
    padding: 0 10px;
    background: linear-gradient(transparent 50%, var(--main-pink) 50%);
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    letter-spacing: 2px;
  }

  /* ==================================================
     月切り替えナビゲーション
  ================================================== */
  .month-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 5px; /* ★下の隙間を限界まで詰める */
    position: relative;
  }

  .month-nav button {
    background: none;
    border: none;
    font-size: 25px; /* ★元に戻す（大きく） */
    color: var(--main-pink);
    cursor: pointer;
    font-weight: bold;
    padding: 0 15px; /* ★上下の余白を削って詰める */
    transition: opacity 0.2s;
  }

  .month-nav button:active {
    opacity: 0.5;
  }

  .month-nav h2 {
    font-size: 28px; /* ★元に戻す（大きく） */
    font-weight: 900;
    color: var(--text-black);
    letter-spacing: 2px;
    min-width: 140px; /* ★元に戻す */
    text-align: center;
  }

  .month-nav .calendar-today-btn {
    position: absolute;
    right: 0;
    background-color: var(--bg-white);
    color: var(--text-black);
    border: 1px solid var(--text-black);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .month-nav .calendar-today-btn:active {
    background-color: var(--text-black);
    color: var(--bg-white);
  }

  /* ==================================================
     スケジュールテーブル
  ================================================== */
  .schedule-wrapper {
    flex-grow: 1; /* 残りの画面サイズをすべて埋める */
    overflow-y: auto; /* ★ここだけを内部スクロールさせる */
    -webkit-overflow-scrolling: touch; /* iOSでの滑らかなスクロール */
    background-color: var(--bg-white);
    padding: 0 10px 40px; /* 左右と下部の余白 */
  }

  .schedule-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
    table-layout: fixed;
  }

  .schedule-table th, 
  .schedule-table td {
    padding: 12px 5px; /* ★tdの上下の余白を少し詰める（元は18px） */
    border-bottom: 1px solid #cccccc;
    vertical-align: middle;
  }

  .schedule-table th {
    font-weight: 900;
    color: var(--bg-white);
    background-color: var(--text-black);
    padding: 6px 0; /* ★黒い見出し行の上下の隙間を極限まで詰める（元は14px） */
    text-align: center;
  }

  /* ★変更: 日程と時間を少し狭く、会場を広く調整 */
  .col-date { width: 16%; }
  .col-time { width: 18%; }
  .col-venue { width: 66%; }

  .schedule-table td:nth-child(1) { text-align: center; white-space: nowrap; }
  .schedule-table td:nth-child(2) { text-align: center; white-space: nowrap; }
  .schedule-table td:nth-child(3) { 
    text-align: left; 
    padding-left: 10px; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
  }

  .schedule-table tbody tr {
    cursor: pointer;
    background-color: var(--bg-white);
    transition: filter 0.2s;
  }

  .schedule-table tbody tr:active {
    filter: brightness(0.95);
  }

  .schedule-table tr.tiktok { background-color: #e6d4ff; }
  .schedule-table tr.anniv { background-color: #ffe6f0; }

  .schedule-table tr.saturday td:first-child { color: #0044ff; }
  .schedule-table tr.sunday td:first-child { color: #ff0000; }

  .schedule-table tr.row-next td:first-child {
    position: relative;
  }
  .schedule-table tr.row-next td:first-child::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background-color: var(--main-pink);
  }

  .empty-msg {
    padding: 40px !important;
    text-align: center !important;
    color: var(--text-black);
    font-weight: bold;
    background-color: var(--bg-white);
  }

  /* ==================================================
     モーダル（ポップアップ）のデザイン
  ================================================== */
  .modal-overlay {
    display: none; 
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.6); 
    z-index: 2000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex; 
  }

  .modal-content {
    background-color: var(--bg-white);
    border: 3px solid var(--text-black);
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    padding: 25px 20px;
    box-shadow: 6px 6px 0 var(--text-black);
    position: relative;
  }

  .modal-close-btn {
    position: absolute;
    top: 10px; right: 15px;
    font-size: 28px;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 15px;
    border-bottom: 2px solid var(--main-pink); 
    padding-bottom: 5px;
    text-align: center;
    color: var(--text-black);
  }

  .modal-info-group {
    margin-bottom: 12px;
  }

  .modal-label {
    display: block;
    font-size: 11px;
    font-weight: bold;
    color: var(--main-pink);
    margin-bottom: 2px;
  }

  .modal-text {
    font-size: 14px;
    font-weight: bold;
    color: var(--text-black);
    line-height: 1.4;
  }

  .modal-text a {
    color: var(--main-pink);
    text-decoration: underline;
    word-break: break-all;
    font-weight: bold;
  }
</style>
</head>
<body>

  <!-- ★ここに共通のメニュー部品（header.html）が自動で読み込まれます -->
  <div id="common-header-container"></div>

  <!-- メインコンテンツ -->
  <main class="page-wrapper">
    <div class="sticky-top-area">
      <h1 class="page-title">SCHEDULE</h1>
      
      <div class="month-nav">
        <button id="prevMonthBtn" onclick="prevMonth()">＜</button>
        <h2 id="currentMonthDisplay">2026.05</h2>
        <button onclick="nextMonth()">＞</button>
        <button class="calendar-today-btn" onclick="goToToday()">今日</button>
      </div>

      <!-- 固定される見出し部分 -->
      <table class="schedule-table" style="margin-bottom: 0;">
        <colgroup>
          <col class="col-date">
          <col class="col-time">
          <col class="col-venue">
        </colgroup>
        <thead>
          <tr>
            <th>日程</th>
            <th>時間</th>
            <th>会場 / タイトル</th>
          </tr>
        </thead>
      </table>
    </div>

    <!-- スクロールされるリスト部分 -->
    <div class="schedule-wrapper">
      <table class="schedule-table">
        <colgroup>
          <col class="col-date">
          <col class="col-time">
          <col class="col-venue">
        </colgroup>
        <tbody id="scheduleBody">
          <!-- JSで予定が生成されます -->
        </tbody>
      </table>

      <!-- ★ボタンのテキストを「直近の予定」に変更 -->
      <div style="text-align: center; margin-top: 30px; margin-bottom: 20px;">
        <button id="saveImageBtn" onclick="saveScheduleImage()" style="background-color: var(--main-pink); color: var(--bg-white); border: none; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.15); transition: opacity 0.2s;">
          📸 直近の予定を画像で保存
        </button>
      </div>
    </div>
  </main>

  <!-- 全体版と同じポップアップ（モーダル） -->
  <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="forceCloseModal()">×</button>
      <div id="modalTitle" class="modal-title">イベント詳細</div>
      <div class="modal-info-group" id="groupVenue">
        <span class="modal-label">開催場所 / 会場</span>
        <div id="modalVenue" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupOpenStart">
        <span class="modal-label">開場 / 開演時間</span>
        <div id="modalOpenStart" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupLive">
        <span class="modal-label">出演時間</span>
        <div id="modalLive" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupTokuten">
        <span class="modal-label">物販 / 特典会</span>
        <div id="modalTokuten" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupBonus">
        <span class="modal-label">入場特典</span>
        <div id="modalBonus" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupTicket">
        <span class="modal-label" id="ticketLabel">チケットURL</span>
        <div id="modalTicketArea" class="modal-text">-</div>
      </div>
    </div>
  </div>

  <script>
    // ==================================================
    // 共通ヘッダー（メニュー）読み込みロジック
    // ==================================================
    async function loadCommonHeader() {
      try {
        const response = await fetch('header.html');
        if (!response.ok) throw new Error('Header load failed');
        const html = await response.text();
        
        // 空箱にメニューの中身を挿入
        document.getElementById('common-header-container').innerHTML = html;
        
        // メニューが挿入された後に、開閉などのボタン処理（イベント）をくっつける
        initMenu();
      } catch (error) {
        console.warn('共通メニューの読み込みに失敗しました。');
      }
    }

    function initMenu() {
      const hamburger = document.getElementById('hamburger');
      const globalNav = document.getElementById('globalNav');
      
      if (!hamburger || !globalNav) return;

      function toggleMenu() {
        hamburger.classList.toggle('active');
        globalNav.classList.toggle('active');
        document.body.classList.toggle('no-scroll');
      }

      hamburger.addEventListener('click', toggleMenu);

      const navLinks = document.querySelectorAll('.nav-link');
      navLinks.forEach(link => {
        link.addEventListener('click', () => {
          if(globalNav.classList.contains('active')) {
            toggleMenu();
          }
        });
      });
    }

    // ==================================================
    // 動的データ読み込み＆表示ロジック (スマホ/PC自動判定入り)
    // ==================================================
    let currentDate = new Date(2026, 4, 1);
    let scheduleEvents = [];

    function addDynamicEvents() {
      for (let y = 2026; y <= 2030; y++) {
        const bdayStr = `${y}/12/17`;
        if (!scheduleEvents.some(ev => ev.date === bdayStr && ev.title.includes('誕生日'))) {
          scheduleEvents.push({ date: bdayStr, title: "誕生日", venue: "ONLINE", openStart: "---", live: "---", tokuten: "---", nyujoTokuten: "---", link: "" });
        }
        for (let m = 1; m <= 12; m++) {
          if (y === 2026 && m < 5) continue;
          let d = new Date(y, m - 1, 1);
          while (d.getMonth() === m - 1) {
            if (d.getDay() === 4) {
              let dateStr = `${y}/${String(m).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
              if (!scheduleEvents.some(ev => ev.date === dateStr && ev.title.includes('TikTok'))) {
                scheduleEvents.push({ date: dateStr, title: "TikTok個人配信", venue: "ONLINE", openStart: "---", live: "木曜定期配信。時間はX等で告知", tokuten: "---", nyujoTokuten: "---", link: "https://www.tiktok.com/@amunyan__" });
              }
            }
            d.setDate(d.getDate() + 1);
          }
        }
      }
    }

    async function loadSchedule() {
      try {
        const response = await fetch('schedule.csv');
        if (!response.ok) throw new Error();
        
        const arrayBuffer = await response.arrayBuffer();
        let csvText = '';
        
        try {
          // スマホ(UTF-8)判定
          const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
          csvText = utf8Decoder.decode(arrayBuffer);
        } catch (e) {
          // PC Excel(Shift-JIS)判定
          const sjisDecoder = new TextDecoder('shift_jis');
          csvText = sjisDecoder.decode(arrayBuffer);
        }
        
        scheduleEvents = parseCSV(csvText);
      } catch (error) {
        console.warn('スケジュールデータの読み込みに失敗しました。');
      }
      addDynamicEvents();
      renderTable();
      scrollToTodayEvent();
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
      if (lines.length <= 1) return [];
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).map(line => {
        const cols = line.split(',').map(c => c.trim());
        if (cols.length < headers.length) return null;
        return { date: cols[0], title: cols[1], venue: cols[2], openStart: cols[3], live: cols[4], tokuten: cols[5], nyujoTokuten: cols[6], link: cols[8] };
      }).filter(item => item !== null);
    }

    function renderTable() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('currentMonthDisplay').textContent = `${year}.${String(month + 1).padStart(2, '0')}`;

      const prevBtn = document.getElementById('prevMonthBtn');
      if (year <= 2026 && month <= 4) {
        prevBtn.style.visibility = 'hidden';
      } else {
        prevBtn.style.visibility = 'visible';
      }

      const tbody = document.getElementById('scheduleBody');
      tbody.innerHTML = '';

      let monthlyEvents = scheduleEvents.filter(ev => {
        const evDate = new Date(ev.date);
        return evDate.getFullYear() === year && evDate.getMonth() === month;
      });

      monthlyEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

      if (monthlyEvents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">予定がありません</td></tr>';
        return;
      }

      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      const today = new Date();
      const isCurrentMonth = (year === today.getFullYear() && month === today.getMonth());
      const todayDate = today.getDate();
      let nextEventMarked = false;

      monthlyEvents.forEach(ev => {
        const evDate = new Date(ev.date);
        const dayOfWeek = evDate.getDay();
        const dateStr = `${evDate.getMonth() + 1}/${evDate.getDate()}<span style="font-size:12px; margin-left:2px;">(${weekdays[dayOfWeek]})</span>`;
        
        let trClass = '';
        if (dayOfWeek === 0) trClass = 'sunday';
        if (dayOfWeek === 6) trClass = 'saturday';
        if (ev.title.includes('TikTok')) trClass = 'tiktok';
        if (ev.title === '誕生日') trClass = 'anniv';

        // 今日の予定、または一番近い次の予定の行の左端にピンクラインを表示
        if (isCurrentMonth && !nextEventMarked) {
          if (evDate.getDate() >= todayDate) {
            trClass += (trClass ? ' ' : '') + 'row-next';
            nextEventMarked = true;
          }
        }

        let displayTime = '未定';
        if (ev.live && ev.live !== '---' && ev.live !== '終日') {
          displayTime = ev.live.split('～')[0] + '～'; 
        } else if (ev.live === '終日') {
          displayTime = '終日';
        }
        if (ev.title.includes('TikTok')) displayTime = '';
        if (ev.title === '誕生日') displayTime = '🎂';

        let isLive = !ev.title.includes('TikTok') && ev.title !== '誕生日';
        let displayTitle = isLive ? `『${ev.title}』` : ev.title;
        let displayVenue = ev.venue && ev.venue !== 'ONLINE' && ev.venue !== '---' ? ev.venue : '';
        let combinedText = displayVenue ? `${displayVenue} ${displayTitle}` : displayTitle;

        const encodedData = encodeURIComponent(JSON.stringify(ev));
        const tr = document.createElement('tr');
        if (trClass) tr.className = trClass;
        tr.onclick = () => openEventDetails(encodedData);
        
        tr.innerHTML = `
          <td style="font-weight: bold;">${dateStr}</td>
          <td style="font-weight: bold; color: #444;">${displayTime}</td>
          <td style="font-weight: bold;">${combinedText}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function prevMonth() { 
      if (currentDate.getFullYear() <= 2026 && currentDate.getMonth() <= 4) return;
      currentDate.setMonth(currentDate.getMonth() - 1); 
      renderTable(); 
      
      const today = new Date();
      if (currentDate.getFullYear() === today.getFullYear() && currentDate.getMonth() === today.getMonth()) {
        scrollToTodayEvent(); // ★当月なら今日へ
      } else {
        document.querySelector('.schedule-wrapper').scrollTo({ top: 0, behavior: 'smooth' }); // ★他月なら一番上へ
      }
    }
    
    function nextMonth() { 
      currentDate.setMonth(currentDate.getMonth() + 1); 
      renderTable(); 
      
      const today = new Date();
      if (currentDate.getFullYear() === today.getFullYear() && currentDate.getMonth() === today.getMonth()) {
        scrollToTodayEvent(); // ★当月なら今日へ
      } else {
        document.querySelector('.schedule-wrapper').scrollTo({ top: 0, behavior: 'smooth' }); // ★他月なら一番上へ
      }
    }

    function goToToday() {
      currentDate = new Date();
      if (currentDate.getFullYear() < 2026 || (currentDate.getFullYear() === 2026 && currentDate.getMonth() < 4)) {
        currentDate = new Date(2026, 4, 1);
      }
      renderTable();
      scrollToTodayEvent();
    }

    function scrollToTodayEvent() {
      const today = new Date();
      if (currentDate.getFullYear() !== today.getFullYear() || currentDate.getMonth() !== today.getMonth()) {
        return; 
      }
      const todayDate = today.getDate();
      const rows = document.querySelectorAll('#scheduleBody tr');
      let targetRow = null;

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row.classList.contains('empty-msg')) continue;
        const dateCellText = row.cells[0].innerText;
        const dayMatch = dateCellText.match(/\/(\d+)/);
        if (dayMatch) {
          const rowDate = parseInt(dayMatch[1], 10);
          if (rowDate >= todayDate) {
            targetRow = row;
            break;
          }
        }
      }
      if (targetRow) {
        setTimeout(() => {
          const wrapper = document.querySelector('.schedule-wrapper');
          // ラッパー内部でのスクロール位置を対象行の上端に合わせる
          const targetPos = targetRow.offsetTop;
          wrapper.scrollTo({ top: targetPos, behavior: 'smooth' });
        }, 150);
      }
    }

    function openEventDetails(encodedData) {
      const ev = JSON.parse(decodeURIComponent(encodedData));
      const dateParts = ev.date.split('/');
      const isBirthday = (parseInt(dateParts[1], 10) === 12 && parseInt(dateParts[2], 10) === 17);
      const isTikTok = ev.title.includes('TikTok');

      const groupVenue = document.getElementById('groupVenue');
      const groupOpenStart = document.getElementById('groupOpenStart');
      const groupLive = document.getElementById('groupLive');
      const groupTokuten = document.getElementById('groupTokuten');
      const groupBonus = document.getElementById('groupBonus');
      const groupTicket = document.getElementById('groupTicket');
      const ticketLabel = document.getElementById('ticketLabel');
      const titleEl = document.getElementById('modalTitle');

      groupVenue.style.display = 'block';
      groupOpenStart.style.display = 'block';
      groupLive.style.display = 'block';
      groupTokuten.style.display = 'block';
      groupBonus.style.display = 'block';
      groupTicket.style.display = 'block';
      ticketLabel.textContent = "チケットURL";

      if (isBirthday) {
        titleEl.innerHTML = `<span style="color: var(--main-pink); font-size: 16px; display: block; margin-bottom: 5px;">🎂 Happy Birthday 🎂<br>お誕生日おめでとう🎉</span>`;
        groupVenue.style.display = 'none';
        groupOpenStart.style.display = 'none';
        groupLive.style.display = 'none';
        groupTokuten.style.display = 'none';
        groupBonus.style.display = 'none';
        groupTicket.style.display = 'none';
      } else if (isTikTok) {
        titleEl.textContent = ev.title;
        groupVenue.style.display = 'none';
        groupOpenStart.style.display = 'none';
        groupTokuten.style.display = 'none';
        groupBonus.style.display = 'none';
        document.getElementById('modalLive').textContent = ev.live || "木曜定期配信。時間はX等で告知";
        ticketLabel.textContent = "配信URL";
        const ticketArea = document.getElementById('modalTicketArea');
        ticketArea.innerHTML = `<a href="https://www.tiktok.com/@amunyan__" target="_blank" style="color: var(--main-pink); text-decoration: underline; word-break: break-all;">https://www.tiktok.com/@amunyan__</a>`;
      } else {
        titleEl.textContent = ev.title;
        document.getElementById('modalVenue').textContent = ev.venue || '-';
        document.getElementById('modalOpenStart').textContent = ev.openStart || '-';
        document.getElementById('modalLive').textContent = ev.live || '-';
        document.getElementById('modalTokuten').textContent = ev.tokuten || '-';
        
        // ★修正：空の時に「なし」ではなく「-」を表示するように修正
        document.getElementById('modalBonus').textContent = ev.nyujoTokuten || '-';

        const ticketArea = document.getElementById('modalTicketArea');
        const hasLink = ev.link && ev.link.trim() !== '' && ev.link.trim() !== '#' && ev.link.trim() !== 'undefined';
        if (hasLink) {
          const cleanLink = ev.link.trim();
          ticketArea.innerHTML = `<a href="${cleanLink}" target="_blank" style="color: var(--main-pink); text-decoration: underline; word-break: break-all;">${cleanLink}</a>`;
          groupTicket.style.display = 'block';
        } else {
          groupTicket.style.display = 'none';
        }
      }
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(event) {
      if (event.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    }
    function forceCloseModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // ==================================================
    // ★画像保存機能（今日から未来へ最大15件・月またぎ対応）
    // ==================================================
    async function saveScheduleImage() {
      if (typeof html2canvas === 'undefined') {
        alert('画像作成プログラムを読み込み中です。数秒後にもう一度お試しください。');
        return;
      }

      const btn = document.getElementById('saveImageBtn');
      const origBtnText = btn.innerHTML;
      btn.innerHTML = '⏳ 画像を生成中...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      // 1. 直近15件のイベントを取得
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let upcomingEvents = scheduleEvents.filter(ev => {
        const evDate = new Date(ev.date);
        return evDate >= today;
      });

      upcomingEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
      
      // ★追加: TikTok配信が連続して2回続く場合、そこでリスト表示を打ち切る例外処理
      let tempFilteredEvents = [];
      let consecutiveTikTokCount = 0;
      for (let ev of upcomingEvents) {
        if (ev.title.includes('TikTok')) {
          consecutiveTikTokCount++;
        } else {
          consecutiveTikTokCount = 0;
        }
        
        tempFilteredEvents.push(ev);
        
        // TikTokが2連続（間に他のライブが無い）したら、それ以降の予定は追加せずに終了
        if (consecutiveTikTokCount >= 2) {
          break; 
        }
      }
      
      upcomingEvents = tempFilteredEvents.slice(0, 15); // 最大15件に絞る

      // 2. タイトルの月表記を動的に決定（月またぎなら「2026.05 - 06」のようにする）
      let monthDisplay = document.getElementById('currentMonthDisplay').textContent;
      if (upcomingEvents.length > 0) {
        const firstEv = new Date(upcomingEvents[0].date);
        const lastEv = new Date(upcomingEvents[upcomingEvents.length - 1].date);
        
        const firstMonthStr = `${firstEv.getFullYear()}.${String(firstEv.getMonth() + 1).padStart(2, '0')}`;
        const lastMonthStr = `${lastEv.getFullYear()}.${String(lastEv.getMonth() + 1).padStart(2, '0')}`;
        
        if (firstMonthStr !== lastMonthStr) {
          if (firstEv.getFullYear() === lastEv.getFullYear()) {
            monthDisplay = `${firstMonthStr} - ${String(lastEv.getMonth() + 1).padStart(2, '0')}`;
          } else {
            monthDisplay = `${firstMonthStr} - ${lastMonthStr}`;
          }
        } else {
          monthDisplay = firstMonthStr;
        }
      }

      const captureContainer = document.createElement('div');
      captureContainer.style.position = 'absolute';
      captureContainer.style.left = '-9999px';
      captureContainer.style.top = '0';
      captureContainer.style.width = '600px'; 
      captureContainer.style.backgroundColor = '#ffffff';
      captureContainer.style.padding = '30px 20px';
      captureContainer.style.boxSizing = 'border-box';
      captureContainer.style.fontFamily = "'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif";

      const now = new Date();
      const dateText = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} 付`;

      const titleObj = document.createElement('div');
      titleObj.style.position = 'relative';
      titleObj.style.marginBottom = '5px';
      titleObj.innerHTML = `
        <div style="text-align: center; margin-bottom: 5px;">
          <h2 style="display: inline-block; font-size: 32px; font-weight: 900; color: #111; margin: 0; padding: 0 10px; background: linear-gradient(transparent 50%, #ff2a7a 50%); text-shadow: 1px 1px 0 #fff, 2px 2px 0 #fff, 3px 3px 0 #fff; letter-spacing: 2px;">あむちゃん　スケジュール</h2>
        </div>
        <div style="text-align: center; font-size: 28px; font-weight: 900; color: #111; letter-spacing: 2px;">${monthDisplay}</div>
        <div style="position: absolute; right: 0; bottom: 0; font-size: 10px; color: #666; font-weight: bold;">${dateText}</div>
      `;
      captureContainer.appendChild(titleObj);

      const table = document.createElement('table');
      table.style.width = '100%';
      table.style.borderCollapse = 'collapse';
      table.style.fontSize = '15px';
      table.style.tableLayout = 'fixed'; 

      const thead = document.createElement('thead');
      thead.innerHTML = `
        <tr>
          <th style="background-color: #111; color: #fff; padding: 10px 5px; width: 16%; border-bottom: 2px solid #111;">日程</th>
          <th style="background-color: #111; color: #fff; padding: 10px 5px; width: 18%; border-bottom: 2px solid #111;">時間</th>
          <th style="background-color: #111; color: #fff; padding: 10px 5px; width: 66%; border-bottom: 2px solid #111;">会場 / タイトル</th>
        </tr>
      `;
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      
      if (upcomingEvents.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; padding: 40px; font-weight: bold; border-bottom: 1px solid #ccc;">予定がありません</td></tr>`;
      } else {
        const tempCanvas = document.createElement('canvas');
        const ctx = tempCanvas.getContext('2d');
        ctx.font = 'bold 15px "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif';
        const maxWidth = 365;
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

        // 抽出した15件のデータから行を生成
        upcomingEvents.forEach(ev => {
          const evDate = new Date(ev.date);
          const dayOfWeek = evDate.getDay();
          const dateStr = `${evDate.getMonth() + 1}/${evDate.getDate()}<span style="font-size:12px; margin-left:2px;">(${weekdays[dayOfWeek]})</span>`;

          let dateColor = '#111';
          let bgColor = 'transparent';
          
          if (dayOfWeek === 0) dateColor = '#ff0000';
          if (dayOfWeek === 6) dateColor = '#0044ff';
          if (ev.title.includes('TikTok')) bgColor = '#e6d4ff';
          if (ev.title === '誕生日') bgColor = '#ffe6f0';

          let displayTime = '未定';
          if (ev.live && ev.live !== '---' && ev.live !== '終日') {
            displayTime = ev.live.split('～')[0] + '～'; 
          } else if (ev.live === '終日') {
            displayTime = '終日';
          }
          if (ev.title.includes('TikTok')) displayTime = '';
          if (ev.title === '誕生日') displayTime = '🎂';

          let isLive = !ev.title.includes('TikTok') && ev.title !== '誕生日';
          let displayTitle = isLive ? `『${ev.title}』` : ev.title;
          let displayVenue = ev.venue && ev.venue !== 'ONLINE' && ev.venue !== '---' && ev.venue !== '-' ? ev.venue : '';
          let combinedText = displayVenue ? `${displayVenue} ${displayTitle}` : displayTitle;

          let truncated = combinedText;
          if (ctx.measureText(truncated).width > maxWidth) {
            while (ctx.measureText(truncated + '...').width > maxWidth && truncated.length > 0) {
              truncated = truncated.slice(0, -1);
            }
            truncated += '...';
          }

          const tr = document.createElement('tr');
          tr.style.borderBottom = '1px solid #ccc';
          if (bgColor !== 'transparent') tr.style.backgroundColor = bgColor;

          tr.innerHTML = `
            <td style="padding: 12px 5px; text-align: center; font-weight: bold; color: ${dateColor};">${dateStr}</td>
            <td style="padding: 12px 5px; text-align: center; font-weight: bold; color: #444;">${displayTime}</td>
            <td style="padding: 12px 5px 12px 10px; text-align: left; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: clip;">${truncated}</td>
          `;
          tbody.appendChild(tr);
        });
      }
      table.appendChild(tbody);
      captureContainer.appendChild(table);

      const footer = document.createElement('div');
      footer.style.textAlign = 'right';
      footer.style.marginTop = '10px';
      footer.style.fontSize = '9px';
      footer.style.color = '#999';
      footer.style.fontWeight = 'bold';
      footer.innerText = '【非公式】勝手にあむちゃん応援ファンサイト';
      captureContainer.appendChild(footer);

      document.body.appendChild(captureContainer);

      setTimeout(async () => {
        try {
          const canvas = await html2canvas(captureContainer, {
            scale: 2, 
            useCORS: true,
            backgroundColor: '#ffffff'
          });
          
          const link = document.createElement('a');
          // 保存ファイル名も「2026_05_06」のように自動変換されます
          const fileMonthStr = monthDisplay.replace(/[\s\-\.]/g, '_').replace(/_+/g, '_');
          link.download = `あむちゃん_スケジュール_${fileMonthStr}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (error) {
          console.error('画像化エラー:', error);
          alert('画像の保存に失敗しました。');
        } finally {
          document.body.removeChild(captureContainer);
          btn.innerHTML = origBtnText;
          btn.disabled = false;
          btn.style.opacity = '1';
        }
      }, 100);
    }

    // 画面ロード時に、メニューとスケジュールの両方を読み込む
    window.addEventListener('load', () => {
      loadCommonHeader();
      loadSchedule();
    });
  </script>
