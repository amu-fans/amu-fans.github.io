  /* ==================================================
     ベース設定（全体版と同じカラー・フォント）
  ================================================== */
  :root {
    --main-pink: #ff2a7a;
    --text-black: #111111;
    --bg-white: #ffffff;
    --bg-light: #f9f9f9;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    color: var(--text-black);
    background-color: var(--bg-white);
    max-width: 768px;
    margin: 0 auto;
  }

  .no-scroll {
    overflow: hidden;
  }

  /* ==================================================
     ヘッダー＆メニュー用CSS（共通）
  ================================================== */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 1100;
    background-color: var(--main-pink);
  }

  .site-logo {
    font-size: 13px;
    font-weight: bold;
    color: var(--bg-white);
    text-decoration: none;
    z-index: 1001;
    line-height: 1.3;
    max-width: calc(100% - 50px);
  }

  .hamburger {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
  }

  .hamburger span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: var(--bg-white);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .hamburger span:nth-child(3) { bottom: 0; }

  .hamburger.active span:nth-child(1) {
    top: 50%;
    transform: translateY(-50%) rotate(45deg);
    background-color: var(--bg-white);
  }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) {
    bottom: 50%;
    transform: translateY(50%) rotate(-45deg);
    background-color: var(--bg-white);
  }

  .global-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100vw;
    max-width: 768px;
    height: 100vh;
    background-color: var(--bg-white);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 100px;
    align-items: center;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  .global-nav.active {
    transform: translateX(0);
  }

  .nav-list {
    list-style: none;
    text-align: center;
  }

  .nav-list li { margin: 25px 0; }
  .nav-list a {
    color: var(--text-black);
    text-decoration: none;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 2px;
    display: block;
  }
  .nav-list span {
    display: block;
    font-size: 12px;
    font-weight: normal;
    margin-top: 5px;
    opacity: 0.8;
  }

     ページコンテンツ
  ================================================== */
  .page-wrapper {
    padding: 100px 20px 60px; /* ヘッダー分＋少し余裕を持たせた余白 */
    min-height: 100vh;
    background-color: var(--bg-light);

  .page-title {

    font-size: 32px;

    background: linear-gradient(transparent 50%, var(--main-pink) 50%);
    position: relative;
    left: 50%;
    transform: translateX(-50%);

  .page-subtitle {

    letter-spacing: 1px;
    display: block;
    text-align: center;

  <script>
    // ==================================================
    // 共通ヘッダー（メニュー）読み込みロジック
    // ==================================================
    async function loadCommonHeader() {
      try {
        const response = await fetch('header.html');
        if (!response.ok) throw new Error('Header load failed');
        const html = await response.text();
        
        document.getElementById('common-header-container').innerHTML = html;
        initMenu();
      } catch (error) {
        console.warn('共通メニューの読み込みに失敗しました。');
      }
    }

    function initMenu() {
      const hamburger = document.getElementById('hamburger');
      const globalNav = document.getElementById('globalNav');
      
      if (!hamburger || !globalNav) return;

      function toggleMenu() {
        hamburger.classList.toggle('active');
        globalNav.classList.toggle('active');
        document.body.classList.toggle('no-scroll');
      }

      hamburger.addEventListener('click', toggleMenu);

      const navLinks = document.querySelectorAll('.nav-list a');
      navLinks.forEach(link => {
        link.addEventListener('click', () => {
          if(globalNav.classList.contains('active')) {
            toggleMenu();
          }
        });
      });
    }

    // 画面ロード時にメニューを読み込む
    window.addEventListener('load', loadCommonHeader);
  </script>
