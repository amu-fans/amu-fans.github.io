<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【非公式】勝手にあむちゃん応援ファンサイト</title>
<style>
  /* ==================================================
     ベース設定
  ================================================== */
  :root {
    --main-pink: #ff2a7a;
    --text-black: #111111;
    --bg-white: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    color: var(--text-black);
    background-color: var(--bg-white);
    overflow-x: hidden;
    max-width: 768px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1; 
  }

  .no-scroll {
    overflow: hidden;
  }

  /* ==================================================
     ローディング画面
  ================================================== */
  #loading {
    position: fixed;
    top: 0;
    bottom: 0; 
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 100%; 
    background-color: var(--main-pink);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
  }

  #loading.loaded {
    transform: translateY(-100%);
  }

  .loading-logo {
    color: var(--bg-white);
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.2;
    animation: pulse 1.5s infinite;
  }

  .loading-logo-en {
    display: block;
    font-size: 21px;
    letter-spacing: 4px;
    margin-top: 5px;
  }

  @keyframes pulse {
    0% { opacity: 0.5; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 0.5; transform: scale(0.95); }
  }

  /* ==================================================
     ヘッダー
  ================================================== */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 1100;
    background-color: var(--main-pink);
    transition: background-color 0.3s;
  }

  .header.scrolled {
    background-color: rgba(255, 42, 122, 0.95);
    border-bottom: 1px solid #d81b60;
  }

  .site-logo {
    font-size: 13px;
    font-weight: bold;
    color: var(--bg-white);
    text-decoration: none;
    letter-spacing: 0.5px;
    z-index: 1001;
    line-height: 1.3;
    max-width: calc(100% - 50px);
  }

  .hamburger {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
  }

  .hamburger span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: var(--bg-white);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .hamburger span:nth-child(3) { bottom: 0; }

  .hamburger.active span:nth-child(1) {
    top: 50%;
    transform: translateY(-50%) rotate(45deg);
    background-color: var(--bg-white);
  }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) {
    bottom: 50%;
    transform: translateY(50%) rotate(-45deg);
    background-color: var(--bg-white);
  }

  /* ==================================================
     全画面ナビゲーションメニュー
  ================================================== */
  .global-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 100vh;
    background-color: var(--bg-white);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; 
    padding-top: 100px; 
    align-items: center;
    transform: translateX(100vw);
    transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .global-nav.active {
    transform: translateX(0);
  }

  .nav-list {
    list-style: none;
    text-align: center;
  }

  .nav-list li {
    margin: 25px 0;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .global-nav.active .nav-list li {
    opacity: 1;
    transform: translateY(0);
  }

  .global-nav.active .nav-list li:nth-child(1) { transition-delay: 0.3s; }
  .global-nav.active .nav-list li:nth-child(2) { transition-delay: 0.4s; }
  .global-nav.active .nav-list li:nth-child(3) { transition-delay: 0.5s; }
  .global-nav.active .nav-list li:nth-child(4) { transition-delay: 0.6s; }

  .nav-list a {
    color: var(--text-black);
    text-decoration: none;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 2px;
    display: block;
  }

  .nav-list span {
    display: block;
    font-size: 12px;
    font-weight: normal;
    margin-top: 5px;
    opacity: 0.8;
  }

  /* ==================================================
     ヒーローエリア（いかなる環境でも画像をカットしない設定）
  ================================================== */
  .hero {
    width: 100%;
    margin-top: 60px; 
    position: relative;
    background-color: var(--bg-white);
    overflow: visible !important; /* はみ出しによるカットを防ぐ */
    height: auto !important;      /* 高さをブラウザサイズに固定させない */
    container-type: inline-size;  /* 画像サイズに合わせて文字を比例縮小させるコンテナ指定 */
  }

  .hero-image {
    width: 100%;
    height: auto !important;       /* 縦横比を完全に維持して縮小・拡大 */
    object-fit: contain !important; /* トリミングを絶対に発生させない */
    display: block;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  /* ==================================================
     赤いライン座布団と文字（カウントダウン）
  ================================================== */
  .countdown-wrapper {
    position: absolute;
    /* @渋谷WWW Xの赤看板ロゴと被らないように、bottomの値を8%から14.5%へ引き上げ */
    bottom: 14.5%; 
    right: 6%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    /* 余分な余白を詰め、中身の文字で幅いっぱいに満たすためのパディング調整 */
    padding: clamp(4px, 1cqw, 8px) clamp(10px, 2.2cqw, 18px); 
    background-color: #d10028; /* 赤ライン座布団 */
    transform: rotate(-3deg); /* 傾きを同調 */
    border-radius: 4px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
  }

  .countdown-text {
    color: #ffffff;
    font-weight: 900;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: baseline;
    gap: 3px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5); /* 背景に埋もれないための影 */
  }

  /* 「あと」 */
  .countdown-prefix {
    font-size: clamp(12px, 2.4cqw, 18px); 
    letter-spacing: -0.5px;
  }

  /* 際立たせる数字（両脇のスペースを埋めるため、サイズを大幅にスケールアップ） */
  .countdown-number {
    /* clampの上限・基準値を引き上げ、スペースをきれいに埋めるサイズに調整 */
    font-size: clamp(44px, 9.6cqw, 72px); 
    line-height: 0.85;
    font-family: 'Impact', 'Arial Black', sans-serif; /* 太く強いフォント */
    letter-spacing: -1.5px;
    padding: 0 2px;
  }

  /* 「にち」 */
  .countdown-suffix {
    font-size: clamp(12px, 2.4cqw, 18px); 
    letter-spacing: -0.5px;
  }

  /* ==================================================
     共通セクションスタイル
  ================================================== */
  .section-wrapper {
    padding: 40px 20px; 
    background-color: var(--bg-white);
  }
  
  .section-wrapper:nth-child(even) {
    background-color: #fafafa;
  }

  .section-title {
    font-size: 44px; 
    font-weight: 900;
    color: var(--text-black); 
    text-shadow: 
      1px 1px 0 var(--bg-white),
      2px 2px 0 var(--bg-white),
      3px 3px 0 var(--bg-white),
      4px 4px 0 var(--bg-white); 
    letter-spacing: 2px;
    margin-bottom: 5px;
    line-height: 1.2; 
    display: inline-block; 
    padding: 0 10px; 
    background: linear-gradient(transparent 50%, var(--main-pink) 50%);
  }

  .section-subtitle {
    font-size: 12px;
    font-weight: bold;
    color: var(--main-pink);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 20px; 
  }

  /* ==================================================
     スケジュール（カレンダー表示）
  ================================================== */
  .calendar-header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 15px;
    position: relative; 
  }

  .calendar-year-month {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-black);
    letter-spacing: 2px;
  }

  .calendar-nav-btn {
    background: none;
    border: none;
    font-size: 25px;
    color: var(--main-pink);
    cursor: pointer;
    font-weight: bold;
    padding: 5px 15px;
    transition: opacity 0.2s;
  }
  .calendar-nav-btn:active {
    opacity: 0.5;
  }

  .calendar-today-btn {
    position: absolute;
    right: 0;
    background-color: var(--bg-white);
    color: var(--text-black);
    border: 1px solid var(--text-black);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .calendar-today-btn:active {
    background-color: var(--text-black);
    color: var(--bg-white);
  }

  .calendar-container {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
    background-color: var(--bg-white);
    margin-bottom: 10px;
    table-layout: fixed; 
  }

  .calendar-container th {
    background-color: var(--text-black);
    color: var(--bg-white);
    padding: 10px 0;
    font-size: 12px;
    border: 1px solid var(--text-black);
  }

  .calendar-container td {
    border: 1px solid #dddddd;
    height: 85px; 
    vertical-align: top;
    padding: 2px; 
    font-size: 12px;
    font-weight: bold;
    color: var(--text-black);
    transition: background-color 0.2s;
  }

  .calendar-container td:nth-child(6) {
    background-color: #e6f0ff;
  }
  
  .calendar-container td:nth-child(7) {
    background-color: #ffe6e6;
  }

  .calendar-container td.is-holiday {
    background-color: #ffe6e6;
  }

  .date-num {
    text-align: left;
    padding-left: 2px;
    margin-bottom: 2px;
    color: var(--text-black);
  }
  
  .calendar-container td:nth-child(6) .date-num {
    color: #4444ff;
  }
  .calendar-container td:nth-child(7) .date-num,
  .calendar-container td.is-holiday .date-num {
    color: #ff4444;
  }

  /* イベントバッジスタイル */
  .event-item {
    font-size: 8px;
    padding: 2px;
    margin-bottom: 2px;
    border-radius: 2px;
    text-align: left;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s;
  }
  .event-item:active {
    transform: scale(0.95);
  }

  .event-item.cat-anniv {
    background-color: var(--main-pink);
    color: var(--bg-white);
  }

  .event-item.cat-live {
    background-color: #0066ff;
    color: var(--bg-white);
  }

  .event-item.cat-tiktok {
    background-color: #9900ff;
    color: var(--bg-white);
  }

  /* リスト一覧スケジュールへのリンク用スタイル */
  .list-schedule-link {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: 10px;
    text-decoration: none;
    color: var(--text-black);
    font-size: 12px;
    font-weight: bold;
    gap: 5px;
    transition: opacity 0.2s;
  }

  .list-schedule-link:active {
    opacity: 0.6;
  }

  .list-schedule-link svg {
    width: 20px;
    height: 20px;
    fill: var(--main-pink);
  }

  /* ==================================================
     SNSセクション設定
  ================================================== */
  .sns-group {
    margin-bottom: 30px; 
  }

  .sns-group-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text-black);
    margin-bottom: 15px; 
    border-left: 4px solid var(--main-pink);
    padding-left: 10px;
    line-height: 1;
  }

  .twitter-wrapper {
    border: 2px solid var(--text-black);
    border-radius: 8px;
    overflow: hidden;
    max-height: 400px; 
    background-color: #fff;
    margin-bottom: 15px; 
  }

  .social-icons-wrapper {
    display: flex;
    justify-content: flex-start;
    gap: 20px;
    flex-wrap: wrap;
  }

  .social-icon {
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: var(--text-black);
    color: var(--bg-white);
    border-radius: 50%;
    text-decoration: none;
    transition: transform 0.2s;
  }

  .social-icon:active {
    transform: scale(0.9);
  }

  .social-icon svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
  }

  /* ==================================================
     予定詳細確認用 モーダル画面
  ================================================== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background-color: #fff;
    border: 3px solid var(--text-black);
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    padding: 25px 20px;
    box-shadow: 6px 6px 0 var(--text-black);
    position: relative;
  }

  .modal-close-btn {
    position: absolute;
    top: 10px; right: 15px;
    font-size: 28px;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 15px;
    border-bottom: 2px solid var(--main-pink);
    padding-bottom: 5px;
    text-align: center;
  }

  .modal-info-group {
    margin-bottom: 12px;
  }

  .modal-label {
    display: block;
    font-size: 11px;
    font-weight: bold;
    color: var(--main-pink);
    margin-bottom: 2px;
  }

  .modal-text {
    font-size: 14px;
    font-weight: bold;
    color: var(--text-black);
    line-height: 1.4;
  }

  .modal-text a {
    color: var(--main-pink);
    text-decoration: underline;
    word-break: break-all;
    font-weight: bold;
  }

</style>
</head>

  <!-- ★ここがフッターの挿入ポイントになります -->
  <div id="footer-container"></div>

  <!-- ==================================================
     予定詳細確認用 モーダル画面
  ================================================== */ -->
  <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="forceCloseModal()">×</button>
      <div id="modalTitle" class="modal-title">イベント詳細</div>
      <div class="modal-info-group" id="groupVenue">
        <span class="modal-label">開催場所 / 会場</span>
        <div id="modalVenue" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupOpenStart">
        <span class="modal-label">開場 / 開演時間</span>
        <div id="modalOpenStart" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupLive">
        <span class="modal-label">内容</span>
        <div id="modalLive" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupTokuten">
        <span class="modal-label">物販 / 特典会</span>
        <div id="modalTokuten" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupBonus">
        <span class="modal-label">入場特典</span>
        <div id="modalBonus" class="modal-text">-</div>
      </div>
      <div class="modal-info-group" id="groupTicket">
        <span class="modal-label" id="ticketLabel">チケットURL</span>
        <div id="modalTicketArea" class="modal-text">-</div>
      </div>
    </div>
  </div>

<script>
  // ==================================================
  // 動的カレンダー ＆ CSV自動連動システム
  // ==================================================
  let currentDate = new Date(2026, 4, 1); // 初期値
  let scheduleEvents = [];
  let isFirstRender = true; 

  function addDynamicEvents() {
    const currentYear = new Date().getFullYear();
    for (let y = 2026; y <= 2030; y++) {
      const bdayStr = `${y}/12/17`;
      if (!scheduleEvents.some(ev => ev.date === bdayStr && ev.title.includes('誕生日'))) {
        scheduleEvents.push({
          date: bdayStr,
          title: "誕生日",
          venue: "ONLINE",
          openStart: "---",
          live: "---",
          tokuten: "---",
          nyujoTokuten: "---",
          link: ""
        });
      }

      for (let m = 1; m <= 12; m++) {
        if (y === 2026 && m < 5) continue;
        let d = new Date(y, m - 1, 1);
        while (d.getMonth() === m - 1) {
          // 木曜日、または指定期間の月曜日を判定
          const isThursday = d.getDay() === 4;
          const startDate = new Date(2026, 5, 6); // 2026/6/6 (月は0始まりなので5)
          const endDate = new Date(2026, 10, 17); // 2026/11/17 (月は0始まりなので10)
          const isMondayBeforeTarget = d.getDay() === 1 && d >= startDate && d <= endDate;

          if (isThursday || isMondayBeforeTarget) { 
            let mm = String(m).padStart(2, '0');
            let dd = String(d.getDate()).padStart(2, '0');
            let dateStr = `${y}/${mm}/${dd}`;
            
            let liveText = "木曜定期配信。時間はSNSで告知";
            if (d >= startDate && d <= endDate) {
              liveText = "月曜木曜定期配信。時間はSNSで告知";
            }
            
            if (!scheduleEvents.some(ev => ev.date === dateStr && ev.title.includes('TikTok'))) {
              scheduleEvents.push({
                date: dateStr,
                title: "TikTok個人配信",
                venue: "ONLINE", 
                openStart: "---",
                live: liveText,
                tokuten: "---",
                nyujoTokuten: "---",
                link: "https://www.tiktok.com/@amunyan__"
              });
            }
          }
          d.setDate(d.getDate() + 1);
        }
      }
    }
  }

  async function loadScheduleFromCSV() {
    try {
      const response = await fetch('schedule.csv');
      if (!response.ok) throw new Error('CSVロード失敗');
      
      const arrayBuffer = await response.arrayBuffer();
      let csvText = '';
      
      try {
        const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
        csvText = utf8Decoder.decode(arrayBuffer);
      } catch (e) {
        const sjisDecoder = new TextDecoder('shift_jis');
        csvText = sjisDecoder.decode(arrayBuffer);
      }
      
      scheduleEvents = parseCSV(csvText);
    } catch (error) {
      console.warn('スケジュールデータの読み込みに失敗しました。');
      scheduleEvents = [];
    }
    
    addDynamicEvents();
    renderCalendar();
  }

  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
    if (lines.length <= 1) return [];
    
    return lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim());
      while (cols.length < 11) cols.push('');

      const d = cols[0], t = cols[1], v = cols[2];
      const o = cols[3], s = cols[4];
      const ls = cols[5], le = cols[6];
      const ts = cols[7], te = cols[8];
      const nyu = cols[9], link = cols[10];

      let openStart = '---';
      if (o && s) openStart = `${o} / ${s}`;
      else if (o) openStart = `${o} / 未定`;
      else if (s) openStart = `未定 / ${s}`;

      let live = '---';
      if (ls && le) live = `${ls}～${le}`;
      else if (ls) live = (ls === '終日' || ls === '未定') ? ls : `${ls}～`;
      else if (le) live = `～${le}`;

      let tokuten = '---';
      if (ts && te) tokuten = `${ts}～${te}`;
      else if (ts) tokuten = (ts === '終日' || ts === '未定') ? ts : `${ts}～`;
      else if (te) tokuten = `～${te}`;

      return { 
        date: d, 
        title: t, 
        venue: v, 
        openStart: openStart, 
        live: live, 
        tokuten: tokuten, 
        nyujoTokuten: nyu, 
        link: link 
      };
    }).filter(item => item.date !== '');
  }

  function renderCalendar() {
    if (isFirstRender && scheduleEvents.length > 0) {
      isFirstRender = false;
      const today = new Date();
      today.setHours(0, 0, 0, 0); 
      
      const upcomingEvent = scheduleEvents.find(ev => new Date(ev.date) >= today);
      
      if (upcomingEvent) {
        const upcomingDate = new Date(upcomingEvent.date);
        currentDate = new Date(upcomingDate.getFullYear(), upcomingDate.getMonth(), 1);
      } else {
        currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
      }

      if (currentDate.getFullYear() < 2026 || (currentDate.getFullYear() === 2026 && currentDate.getMonth() < 4)) {
        currentDate = new Date(2026, 4, 1);
      }
    }

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById('calendarYearMonth').textContent = `${year}.${String(month + 1).padStart(2, '0')}`;

    const prevBtn = document.querySelector('.calendar-nav-btn[onclick="prevMonth()"]');
    if (year <= 2026 && month <= 4) {
      prevBtn.style.visibility = 'hidden';
    } else {
      prevBtn.style.visibility = 'visible';
    }

    const firstDayIndex = new Date(year, month, 1).getDay(); 
    const totalDays = new Date(year, month + 1, 0).getDate(); 

    const calendarBody = document.getElementById('calendarBody');
    calendarBody.innerHTML = '';

    let dateCounter = 1;
    let html = '';

    let adjustedFirstDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

    for (let i = 0; i < 6; i++) {
      let rowHtml = '<tr>';
      let addedAnyDay = false;

      for (let j = 0; j < 7; j++) {
        const gridIndex = i * 7 + j;
        if (gridIndex < adjustedFirstDay || dateCounter > totalDays) {
          rowHtml += '<td></td>';
        } else {
          const currentDayStr = `${year}/${String(month + 1).padStart(2, '0')}/${String(dateCounter).padStart(2, '0')}`;
          
          const dayEvents = scheduleEvents.filter(ev => {
            const evDate = new Date(ev.date);
            return evDate.getFullYear() === year && evDate.getMonth() === month && evDate.getDate() === dateCounter;
          });

          let eventsHtml = '';
          dayEvents.forEach(ev => {
            let catClass = 'cat-live'; 
            if (ev.title.includes('記念') || ev.title.includes('誕生日')) catClass = 'cat-anniv'; 
            if (ev.title.includes('TikTok') || ev.title.includes('配信')) catClass = 'cat-tiktok'; 

            let label = '';
            if (ev.title.includes('TikTok')) {
              label = 'TikTok個人配信';
            } else {
              if (ev.live && ev.live !== '終日' && ev.live !== '---') {
                label += `${ev.live.split('～')[0]} `;
              }
              
              let venueText = ev.venue;
              if (venueText === 'ONLINE' || !venueText || venueText.trim() === '' || venueText === '---' || venueText === '-') {
                venueText = ev.title;
              }
              label += venueText;
            }

            eventsHtml += `<a class="event-item ${catClass}" onclick="openEventDetails(event, '${encodeURIComponent(JSON.stringify(ev))}')">${label}</a>`;
          });

          rowHtml += `<td>
            <div class="date-num">${dateCounter}</div>
            ${eventsHtml}
          </td>`;
          dateCounter++;
          addedAnyDay = true;
        }
      }
      rowHtml += '</tr>';
      if (addedAnyDay) {
        html += rowHtml;
      }
    }
    calendarBody.innerHTML = html;
  }

  function prevMonth() {
    if (currentDate.getFullYear() <= 2026 && currentDate.getMonth() <= 4) return;
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  }

  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  }

  // ==================================================
  // 今日のイベント位置へスクロール
  // ==================================================
  function goToToday() {
    currentDate = new Date();
    if (currentDate.getFullYear() < 2026 || (currentDate.getFullYear() === 2026 && currentDate.getMonth() < 4)) {
      currentDate = new Date(2026, 4, 1);
    }
    renderCalendar();
  }

  // ==================================================
  // モーダル詳細ウィンドウの制御
  // ==================================================
  function openEventDetails(event, encodedData) {
    event.stopPropagation();
    const ev = JSON.parse(decodeURIComponent(encodedData));

    const isBirthday = ev.title === '誕生日';
    const isTikTok = ev.title.includes('TikTok');

    const groupVenue = document.getElementById('groupVenue');
    const groupOpenStart = document.getElementById('groupOpenStart');
    const groupLive = document.getElementById('groupLive');
    const groupTokuten = document.getElementById('groupTokuten');
    const groupBonus = document.getElementById('groupBonus');
    const groupTicket = document.getElementById('groupTicket');
    const ticketLabel = document.getElementById('ticketLabel');
    const titleEl = document.getElementById('modalTitle');

    groupVenue.style.display = 'block';
    groupOpenStart.style.display = 'block';
    groupLive.style.display = 'block';
    groupTokuten.style.display = 'block';
    groupBonus.style.display = 'block';
    groupTicket.style.display = 'block';
    ticketLabel.textContent = "チケットURL";

    if (isBirthday) {
      titleEl.innerHTML = `<span style="color: var(--main-pink); font-size: 16px; display: block; margin-bottom: 5px;">🎂 Happy Birthday 🎂<br>お誕生日おめでとう🎉</span>`;
      groupVenue.style.display = 'none';
      groupOpenStart.style.display = 'none';
      groupLive.style.display = 'none';
      groupTokuten.style.display = 'none';
      groupBonus.style.display = 'none';
      groupTicket.style.display = 'none';
    } else if (isTikTok) {
      titleEl.textContent = ev.title; 
      groupVenue.style.display = 'none';
      groupOpenStart.style.display = 'none';
      groupTokuten.style.display = 'none';
      groupBonus.style.display = 'none';
      
      document.getElementById('modalLive').textContent = ev.live || "木曜定期配信。時間はSNSで告知";
      
      ticketLabel.textContent = "配信URL";
      const ticketArea = document.getElementById('modalTicketArea');
      ticketArea.innerHTML = `<a href="https://www.tiktok.com/@amunyan__" target="_blank" style="color: var(--main-pink); text-decoration: underline; word-break: break-all;">https://www.tiktok.com/@amunyan__</a>`;
    } else {
      titleEl.textContent = ev.title;
      document.getElementById('modalVenue').textContent = ev.venue || '-';
      document.getElementById('modalOpenStart').textContent = ev.openStart || '-';
      document.getElementById('modalLive').textContent = ev.live || '-';
      document.getElementById('modalTokuten').textContent = ev.tokuten || '-';
      document.getElementById('modalBonus').textContent = ev.nyujoTokuten || '-';

      const ticketArea = document.getElementById('modalTicketArea');
      const hasLink = ev.link && ev.link.trim() !== '' && ev.link.trim() !== '#' && ev.link.trim() !== 'undefined';
      if (hasLink) {
        const cleanLink = ev.link.trim();
        ticketArea.innerHTML = `<a href="${cleanLink}" target="_blank" style="color: var(--main-pink); text-decoration: underline; word-break: break-all;">${cleanLink}</a>`;
        groupTicket.style.display = 'block'; 
      } else {
        groupTicket.style.display = 'none';
      }
    }

    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal(event) {
    if (event.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('active');
    }
  }

  function forceCloseModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  // ==================================================
  // 共通ヘッダー読み込み
  // ==================================================
  async function loadCommonHeader() {
    try {
      const response = await fetch('header.html');
      if (!response.ok) throw new Error('Header load failed');
      const html = await response.text();
      
      // 一旦見えない要素にHTMLを流し込む
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;

      // フッター（#sharedFooter）を探して切り取る
      const footerElement = tempDiv.querySelector('#sharedFooter');
      if (footerElement) {
        footerElement.parentNode.removeChild(footerElement);
        // フッターを本来の配置場所（最下部）に挿入する
        const footerContainer = document.getElementById('footer-container');
        if (footerContainer) {
          footerContainer.appendChild(footerElement);
        }
      }

      // 残りの部分（ヘッダーとメニュー）を上部のコンテナに挿入する
      document.getElementById('common-header-container').innerHTML = tempDiv.innerHTML;
      
      initMenu();
    } catch (error) {
      console.warn('共通メニューの読み込みに失敗しました。');
    }
  }

  function initMenu() {
    const hamburger = document.getElementById('hamburger');
    const globalNav = document.getElementById('globalNav');
    const siteLogo = document.getElementById('siteLogo');
    const navLinks = document.querySelectorAll('.nav-list a');

    if (!hamburger || !globalNav) return;

    function toggleMenu() {
      hamburger.classList.toggle('active');
      globalNav.classList.toggle('active');
      
      if (siteLogo) siteLogo.style.color = 'var(--bg-white)';

      document.body.classList.toggle('no-scroll');
    }

    hamburger.addEventListener('click', toggleMenu);

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        const targetId = link.getAttribute('href');
        
        if (targetId.startsWith('#') || targetId.includes('#')) {
          const hash = targetId.substring(targetId.indexOf('#'));
          const targetElement = document.querySelector(hash);
          
          if (targetElement) {
            e.preventDefault(); 
            if(globalNav.classList.contains('active')) {
              toggleMenu();
            }
            
            setTimeout(() => {
              const headerElement = document.getElementById('header');
              const headerHeight = headerElement ? headerElement.offsetHeight : 60;
              const targetPos = targetElement.getBoundingClientRect().top + window.scrollY - headerHeight;
              
              window.scrollTo({
                top: targetPos,
                behavior: 'smooth'
              });
            }, 400); 
          }
        } else {
          if(globalNav.classList.contains('active')) {
            toggleMenu();
          }
        }
      });
    });
  }

  // ==================================================
  // カウントダウンロジック（日付計算）
  // ==================================================
  function initCrayonCountdown() {
    // ターゲット：2026年11月17日 00:00:00 (JST)
    const targetDate = new Date(2026, 10, 17, 0, 0, 0).getTime();
    const daysEl = document.getElementById('crayonDays');
    const wrapperEl = document.getElementById('crayonCountdown');

    if (!daysEl || !wrapperEl) return;

    function update() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        wrapperEl.style.display = 'none';
        return;
      }
      // 残り日数を切り上げ計算
      const days = Math.ceil(distance / (1000 * 60 * 60 * 24));
      daysEl.textContent = days;
    }
    
    update();
    setInterval(update, 1000 * 60 * 60); // 1時間ごとに更新
  }

  // ==================================================
  // アプリケーションライフサイクル
  // ==================================================
  window.addEventListener('load', () => {
    loadCommonHeader(); 
    loadScheduleFromCSV();
    initCrayonCountdown(); // カウントダウンの初期化

    const loading = document.getElementById('loading');
    const body = document.body;
    setTimeout(() => {
      loading.classList.add('loaded');
      body.classList.remove('no-scroll');

      // 別ページからのハッシュリンク（#sns等）対応
      if (window.location.hash) {
        setTimeout(() => {
          const targetElement = document.querySelector(window.location.hash);
          if (targetElement) {
            const headerElement = document.getElementById('header');
            const headerHeight = headerElement ? headerElement.offsetHeight : 60;
            const targetPos = targetElement.getBoundingClientRect().top + window.scrollY - headerHeight;
            window.scrollTo({
              top: targetPos,
              behavior: 'smooth'
            });
          }
        }, 100);
      }
    }, 1000);
  });

  window.addEventListener('scroll', () => {
    const header = document.getElementById('header');
    if (!header) return; 
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });
</script>
