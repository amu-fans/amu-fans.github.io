<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【非公式】勝手にあむちゃん応援ファンサイト</title>

<!-- Firebase SDK の読み込み -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<!-- 外部化されたFirebase設定ファイルの読み込み -->
<script src="firebase-config.js"></script>

<style>
  :root {
    --main-pink: #ff2a7a;
    --text-black: #111111;
    --bg-white: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    color: var(--text-black);
    background-color: var(--bg-white);
    overflow-x: hidden;
    max-width: 768px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1; 
  }

  .no-scroll {
    overflow: hidden;
  }

  /* ==================================================
     ローディング画面
  ================================================== */
  #loading {
    position: fixed;
    top: 0;
    bottom: 0; 
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 100%; 
    background-color: var(--main-pink);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
  }

  #loading.loaded {
    transform: translateY(-100%);
  }

  .loading-logo {
    color: var(--bg-white);
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.2;
    animation: pulse 1.5s infinite;
  }

  .loading-logo-en {
    display: block;
    font-size: 21px;
    letter-spacing: 4px;
    margin-top: 5px;
  }

  @keyframes pulse {
    0% { opacity: 0.5; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 0.5; transform: scale(0.95); }
  }

  /* ==================================================
     ヘッダー
  ================================================== */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 1100;
    background-color: var(--main-pink);
    transition: background-color 0.3s;
  }

  .header.scrolled {
    background-color: rgba(255, 42, 122, 0.95);
    border-bottom: 1px solid #d81b60;
  }

  .site-logo {
    font-size: 13px;
    font-weight: bold;
    color: var(--bg-white);
    text-decoration: none;
    letter-spacing: 0.5px;
    z-index: 1001;
    line-height: 1.3;
    max-width: calc(100% - 50px);
  }

  .hamburger {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
  }

  .hamburger span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: var(--bg-white);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .hamburger span:nth-child(3) { bottom: 0; }

  .hamburger.active span:nth-child(1) {
    top: 50%;
    transform: translateY(-50%) rotate(45deg);
    background-color: var(--bg-white);
  }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) {
    bottom: 50%;
    transform: translateY(50%) rotate(-45deg);
    background-color: var(--bg-white);
  }

  /* ==================================================
     全画面ナビゲーションメニュー
  ================================================== */
  .global-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 100%;
    max-width: 768px;
    height: 100vh;
    background-color: var(--bg-white);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; 
    padding-top: 100px; 
    align-items: center;
    transform: translateX(100vw);
    transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .global-nav.active {
    transform: translateX(0);
  }

  .nav-list {
    list-style: none;
    text-align: center;
  }

  .nav-list li {
    margin: 25px 0;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .global-nav.active .nav-list li {
    opacity: 1;
    transform: translateY(0);
  }

  .global-nav.active .nav-list li:nth-child(1) { transition-delay: 0.3s; }
  .global-nav.active .nav-list li:nth-child(2) { transition-delay: 0.4s; }
  .global-nav.active .nav-list li:nth-child(3) { transition-delay: 0.5s; }
  .global-nav.active .nav-list li:nth-child(4) { transition-delay: 0.6s; }

  .nav-list a {
    color: var(--text-black);
    text-decoration: none;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 2px;
    display: block;
  }

  .nav-list span {
    display: block;
    font-size: 12px;
    font-weight: normal;
    margin-top: 5px;
    opacity: 0.8;
  }

  /* ==================================================
     ヒーローエリア（あむちゃんくりっかー統合）
  ================================================== */
  .hero {
    width: 100%;
    margin-top: 60px; 
    position: relative;
    background-color: #111; 
    background-image: url('/game/bg_a.jpg'); /* 最背面背景 */
    background-size: cover;
    background-position: center;
    overflow: hidden !important; 
    aspect-ratio: 5 / 7; /* game.htmlと同様の5:7に固定 */
    container-type: inline-size;  
  }

  .oshi-wrapper {
    position: absolute;
    left: 50%;
    top: 50%; 
    transform: translate(-50%, -50%);
    transform-origin: center center;
    z-index: 5; 
  }

  .oshi-shaker {
    display: flex;
    justify-content: center;
    align-items: center;
    transform-origin: center center;
  }

  /* タップのレスポンス向上とCanvas基盤の構築 */
  .oshi-button {
    position: relative;
    width: 45cqw;
    height: 45cqw;
    background-color: transparent; 
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transform: translateZ(0) scale(1.5);
    transform-origin: center center;
    will-change: transform;
    -webkit-tap-highlight-color: transparent;
  }

  #oshiCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; /* タップは親要素で判定 */
    /* マスキングの代わりにキャンバス自体にドロップシャドウをかけて発光を表現 */
    filter: drop-shadow(0 0 var(--shadow-blur, 0px) var(--aura-color, transparent));
    transition: filter 0.1s;
  }

  .oshi-button.resetting { 
    transition: transform 0.4s ease-out; 
  }

  /* ==================================================
     ゲーム前面レイヤー・テキストUI
  ================================================== */
  .foreground-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('/game/bg_b.png'); /* 前景画像 */
    background-size: cover;
    background-position: center;
    pointer-events: none; 
    z-index: 8; 
  }

  .counter-area {
    margin-top: 8cqw; 
    text-align: center;
    z-index: 15; 
    width: 100%; 
    position: relative;
  }

  .total-clicks {
    font-size: 8cqw; 
    font-weight: 900;
    letter-spacing: 2px;
    color: #ffffff;
    text-shadow: 
      -0.5cqw -0.5cqw 0 #000,  
       0.5cqw -0.5cqw 0 #000,
      -0.5cqw  0.5cqw 0 #000,
       0.5cqw  0.5cqw 0 #000,
       0 0 15px rgba(0, 0, 0, 0.9);
  }

  .status-area {
    position: relative;
    width: 100%;
    height: 8cqw;
    margin-top: 1cqw;
  }

  .venue-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    font-size: 3.5cqw;
    font-weight: 900;
    color: #ffd700; 
    transition: opacity 0.3s ease;
    white-space: nowrap; 
    text-shadow: 
      -0.3cqw -0.3cqw 0 #000,  
       0.3cqw -0.3cqw 0 #000,
      -0.3cqw  0.3cqw 0 #000,
       0.3cqw  0.3cqw 0 #000,
       0 0 8px rgba(0,0,0,0.8);
    opacity: 1;
  }
  .venue-text.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .combo-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    font-size: 5cqw; 
    font-weight: 900; 
    color: #44ff44;
    transition: color 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
    white-space: nowrap; 
    text-shadow: 
      -0.4cqw -0.4cqw 0 #000,  
       0.4cqw -0.4cqw 0 #000,
      -0.4cqw  0.4cqw 0 #000,
       0.4cqw  0.4cqw 0 #000,
       0 0 10px rgba(0, 0, 0, 0.9);
  }

  .game-area {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10; 
  }

  .tap-guide {
    position: absolute;
    top: 95%; 
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 8cqw;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 
      -0.5cqw -0.5cqw 0 var(--main-pink),  
       0.5cqw -0.5cqw 0 var(--main-pink),
      -0.5cqw  0.5cqw 0 var(--main-pink),
       0.5cqw  0.5cqw 0 var(--main-pink),
       0 0 10px rgba(0,0,0,0.8);
    pointer-events: none; 
    z-index: 20; 
    animation: pulse-tap 1.2s infinite; 
    transition: opacity 0.2s ease-out; 
  }

  /* コンボレベルごとのスタイル変更 */
  .hero.level-2 .combo-text { color: #ffaa00; }
  .hero.level-3 .oshi-shaker { animation: shake 0.2s infinite; }
  .hero.level-3 .combo-text {
    color: #ff0000;
    animation: combo-shake 0.1s infinite;
  }

  .floating-text {
    position: absolute;
    font-weight: 900; 
    color: #fff;
    text-shadow: 
      -0.3cqw -0.3cqw 0 #000,  
       0.3cqw -0.3cqw 0 #000,
      -0.3cqw  0.3cqw 0 #000,
       0.3cqw  0.3cqw 0 #000;
    pointer-events: none; 
    white-space: nowrap; 
    z-index: 20; 
    opacity: 1;
    animation: floatUp 1.0s ease-out forwards;
  }

  @keyframes floatUp {
    0% { transform: translate(-50%, -50%) rotate(var(--angle, 0deg)); opacity: 1; }
    50% { opacity: 1; }
    100% { transform: translate(-50%, calc(-50% - var(--travel-y, 25cqw))) rotate(var(--angle, 0deg)); opacity: 0; }
  }

  @keyframes shake {
    0% { transform: translate(0.2cqw, 0.2cqw) rotate(0deg); }
    10% { transform: translate(-0.2cqw, -0.4cqw) rotate(-1deg); }
    20% { transform: translate(-0.5cqw, 0px) rotate(1deg); }
    30% { transform: translate(0.5cqw, 0.4cqw) rotate(0deg); }
    40% { transform: translate(0.2cqw, -0.2cqw) rotate(1deg); }
    50% { transform: translate(-0.2cqw, 0.4cqw) rotate(-1deg); }
    60% { transform: translate(-0.5cqw, 0.2cqw) rotate(0deg); }
    70% { transform: translate(0.5cqw, 0.2cqw) rotate(-1deg); }
    80% { transform: translate(-0.2cqw, -0.2cqw) rotate(1deg); }
    90% { transform: translate(0.2cqw, 0.4cqw) rotate(0deg); }
    100% { transform: translate(0.2cqw, -0.4cqw) rotate(-1deg); }
  }

  @keyframes combo-shake {
    0% { transform: translate(calc(-50% + 0.2cqw), calc(-50% + 0.2cqw)) rotate(0deg); }
    10% { transform: translate(calc(-50% - 0.2cqw), calc(-50% - 0.4cqw)) rotate(-1deg); }
    20% { transform: translate(calc(-50% - 0.5cqw), calc(-50% + 0px)) rotate(1deg); }
    30% { transform: translate(calc(-50% + 0.5cqw), calc(-50% + 0.4cqw)) rotate(0deg); }
    40% { transform: translate(calc(-50% + 0.2cqw), calc(-50% - 0.2cqw)) rotate(1deg); }
    50% { transform: translate(calc(-50% - 0.2cqw), calc(-50% + 0.4cqw)) rotate(-1deg); }
    60% { transform: translate(calc(-50% - 0.5cqw), calc(-50% + 0.2cqw)) rotate(0deg); }
    70% { transform: translate(calc(-50% + 0.5cqw), calc(-50% + 0.2cqw)) rotate(-1deg); }
    80% { transform: translate(calc(-50% - 0.2cqw), calc(-50% - 0.2cqw)) rotate(1deg); }
    90% { transform: translate(calc(-50% + 0.2cqw), calc(-50% + 0.4cqw)) rotate(0deg); }
    100% { transform: translate(calc(-50% + 0.2cqw), calc(-50% - 0.4cqw)) rotate(-1deg); }
  }

  /* ==================================================
     赤いカウントダウンリボン
  ================================================== */
  .countdown-wrapper {
    position: absolute;
    bottom: 14.5%; 
    right: 6%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
    padding: clamp(4px, 1cqw, 8px) clamp(10px, 2.2cqw, 18px); 
    background-color: #d10028;
    transform: rotate(-3deg); 
    border-radius: 4px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  .countdown-text {
    color: #ffffff;
    font-weight: 900;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: baseline;
    gap: 3px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
  }

  .countdown-prefix {
    font-size: clamp(12px, 2.4cqw, 18px); 
    letter-spacing: -0.5px;
  }

  .countdown-number {
    font-size: clamp(44px, 9.6cqw, 72px); 
    line-height: 0.85;
    font-family: 'Impact', 'Arial Black', sans-serif; 
    letter-spacing: -1.5px;
    padding: 0 2px;
  }

  .countdown-suffix {
    font-size: clamp(12px, 2.4cqw, 18px); 
    letter-spacing: -0.5px;
  }

  /* ==================================================
     共通セクションスタイル
  ================================================== */
  .section-wrapper {
    padding: 40px 20px; 
    background-color: var(--bg-white);
  }
  
  .section-wrapper:nth-child(even) {
    background-color: #fafafa;
  }

  .section-title {
    font-size: 44px; 
    font-weight: 900;
    color: var(--text-black); 
    text-shadow: 
      1px 1px 0 var(--bg-white),
      2px 2px 0 var(--bg-white),
      3px 3px 0 var(--bg-white),
      4px 4px 0 var(--bg-white); 
    letter-spacing: 2px;
    margin-bottom: 5px;
    line-height: 1.2; 
    display: inline-block; 
    padding: 0 10px; 
    background: linear-gradient(transparent 50%, var(--main-pink) 50%);
  }

  .section-subtitle {
    font-size: 12px;
    font-weight: bold;
    color: var(--main-pink);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 20px; 
  }

  /* ==================================================
     スケジュール（カレンダー）
  ================================================== */
  .calendar-header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 15px;
    position: relative; 
  }

  .calendar-year-month {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-black);
    letter-spacing: 2px;
  }

  .calendar-nav-btn {
    background: none;
    border: none;
    font-size: 25px;
    color: var(--main-pink);
    cursor: pointer;
    font-weight: bold;
    padding: 5px 15px;
    transition: opacity 0.2s;
  }
  .calendar-nav-btn:active {
    opacity: 0.5;
  }

  .calendar-today-btn {
    position: absolute;
    right: 0;
    background-color: var(--bg-white);
    color: var(--text-black);
    border: 1px solid var(--text-black);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .calendar-today-btn:active {
    background-color: var(--text-black);
    color: var(--bg-white);
  }

  .calendar-container {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
    background-color: var(--bg-white);
    margin-bottom: 10px;
    table-layout: fixed; 
  }

  .calendar-container th {
    background-color: var(--text-black);
    color: var(--bg-white);
    padding: 10px 0;
    font-size: 12px;
    border: 1px solid var(--text-black);
  }

  .calendar-container td {
    border: 1px solid #dddddd;
    height: 85px; 
    vertical-align: top;
    padding: 2px; 
    font-size: 12px;
    font-weight: bold;
    color: var(--text-black);
    transition: background-color 0.2s;
  }

  .calendar-container td:nth-child(6) {
    background-color: #e6f0ff;
  }
  
  .calendar-container td:nth-child(7) {
    background-color: #ffe6e6;
  }

  .calendar-container td.is-holiday {
    background-color: #ffe6e6;
  }

  .date-num {
    text-align: left;
    padding-left: 2px;
    margin-bottom: 2px;
    color: var(--text-black);
  }
  
  .calendar-container td:nth-child(6) .date-num {
    color: #4444ff;
  }
  .calendar-container td:nth-child(7) .date-num,
  .calendar-container td.is-holiday .date-num {
    color: #ff4444;
  }

  .event-item {
    font-size: 8px;
    padding: 2px;
    margin-bottom: 2px;
    border-radius: 2px;
    text-align: left;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s;
  }
  .event-item:active {
    transform: scale(0.95);
  }

  .event-item.cat-anniv {
    background-color: var(--main-pink);
    color: var(--bg-white);
  }

  .event-item.cat-live {
    background-color: #0066ff;
    color: var(--bg-white);
  }

  .event-item.cat-tiktok {
    background-color: #9900ff;
    color: var(--bg-white);
  }

  /* ==================================================
     リスト一覧カレンダーリンク
  ================================================== */
  .list-schedule-link {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: 10px;
    text-decoration: none;
    color: var(--text-black);
    font-size: 12px;
    font-weight: bold;
    gap: 5px;
    transition: opacity 0.2s;
  }

  .list-schedule-link:active {
    opacity: 0.6;
  }

  .list-schedule-link svg {
    width: 20px;
    height: 20px;
    fill: var(--main-pink);
  }

  /* ==================================================
     SNSセクション
  ================================================== */
  .sns-group {
    margin-bottom: 30px; 
  }

  .sns-group-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text-black);
    margin-bottom: 15px; 
    border-left: 4px solid var(--main-pink);
    padding-left: 10px;
    line-height: 1;
  }

  .twitter-wrapper {
    border: 2px solid var(--text-black);
    border-radius: 8px;
    overflow: hidden;
    max-height: 400px; 
    background-color: #fff;
    margin-bottom: 15px; 
  }

  .social-icons-wrapper {
    display: flex;
    justify-content: flex-start;
    gap: 20px;
    flex-wrap: wrap;
  }

  .social-icon {
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: var(--text-black);
    color: var(--bg-white);
    border-radius: 50%;
    text-decoration: none;
    transition: transform 0.2s;
  }

  .social-icon:active {
    transform: scale(0.9);
  }

  .social-icon svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
  }

  /* ==================================================
     予定詳細確認用 モーダル画面
  ================================================== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background-color: #fff;
    border: 3px solid var(--text-black);
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    padding: 25px 20px;
    box-shadow: 6px 6px 0 var(--text-black);

<script>
  // ==================================================
  // 動的カレンダー ＆ CSV自動連動システム
  // ==================================================
  let currentDate = new Date(2026, 4, 1); 
  let scheduleEvents = [];
  let isFirstRender = true; 

  function addDynamicEvents() {
    const currentYear = new Date().getFullYear();
    for (let y = 2026; y <= 2030; y++) {
      const bdayStr = `${y}/12/17`;
      if (!scheduleEvents.some(ev => ev.date === bdayStr && ev.title.includes('誕生日'))) {
        scheduleEvents.push({
          date: bdayStr,
          important: '', 
          title: "誕生日",
          venue: "ONLINE",
          openStart: "---",
          live: "---",
          tokuten: "---",
          nyujoTokuten: "---",
          link: ""
        });
      }

      for (let m = 1; m <= 12; m++) {
        if (y === 2026 && m < 5) continue;
        let d = new Date(y, m - 1, 1);
        while (d.getMonth() === m - 1) {
          const isThursday = d.getDay() === 4;
          const startDate = new Date(2026, 5, 6); 
          const endDate = new Date(2026, 10, 17); 
          const isMondayBeforeTarget = d.getDay() === 1 && d >= startDate && d <= endDate;

          if (isThursday || isMondayBeforeTarget) { 
            let mm = String(m).padStart(2, '0');
            let dd = String(d.getDate()).padStart(2, '0');
            let dateStr = `${y}/${mm}/${dd}`;
            
            let liveText = "木曜定期配信。時間はSNSで告知";
            if (d >= startDate && d <= endDate) {
              liveText = "月曜木曜定期配信。時間はSNSで告知";
            }
            
            if (!scheduleEvents.some(ev => ev.date === dateStr && ev.title.includes('TikTok'))) {
              scheduleEvents.push({
                date: dateStr,
                important: '', 
                title: "TikTok個人配信",
                venue: "ONLINE", 
                openStart: "---",
                live: liveText,
                tokuten: "---",
                nyujoTokuten: "---",
                link: "https://www.tiktok.com/@amunyan__"
              });
            }
          }
          d.setDate(d.getDate() + 1);
        }
      }
    }
  }

  async function loadScheduleFromCSV() {
    try {
      const response = await fetch('schedule.csv');
      if (!response.ok) throw new Error('CSVロード失敗');
      
      const arrayBuffer = await response.arrayBuffer();
      let csvText = '';
      
      try {
        const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
        csvText = utf8Decoder.decode(arrayBuffer);
      } catch (e) {
        const sjisDecoder = new TextDecoder('shift_jis');
        csvText = sjisDecoder.decode(arrayBuffer);
      }
      
      scheduleEvents = parseCSV(csvText);
    } catch (error) {
      console.warn('スケジュールデータの読み込みに失敗しました。モックデータで継続します。');
      scheduleEvents = [];
    }
    
    addDynamicEvents();
    renderCalendar();
  }

  // ★ 修正：12列分（重要フラグ対応）を確保しつつ列を正しく割り当てる（装飾等は一切なし）
  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
    if (lines.length <= 1) return [];
    
    return lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim());
      // 新しいCSVフォーマットに合わせて12列分を確保
      while (cols.length < 12) cols.push('');

      // 列を1つずつずらして正しく割り当て
      const d = cols[0], imp = cols[1], t = cols[2], v = cols[3];
      const o = cols[4], s = cols[5];
      const ls = cols[6], le = cols[7];
      const ts = cols[8], te = cols[9];
      const nyu = cols[10], link = cols[11];

      let openStart = '---';
      if (o && s) openStart = `${o} / ${s}`;
      else if (o) openStart = `${o} / 未定`;
      else if (s) openStart = `未定 / ${s}`;

      let live = '---';
      if (ls && le) live = `${ls}～${le}`;
      else if (ls) live = (ls === '終日' || ls === '未定') ? ls : `${ls}～`;
      else if (le) live = `～${le}`;

      let tokuten = '---';
      if (ts && te) tokuten = `${ts}～${te}`;
      else if (ts) tokuten = (ts === '終日' || ts === '未定') ? ts : `${ts}～`;
      else if (te) tokuten = `～${te}`;

      return { 
        date: d, 
        important: imp,
        title: t, 
        venue: v, 
        openStart: openStart, 
        live: live, 
        tokuten: tokuten, 
        nyujoTokuten: nyu, 
        link: link 
      };
    }).filter(item => item.date !== '');
  }

  function renderCalendar() {
    if (isFirstRender && scheduleEvents.length > 0) {
      isFirstRender = false;
      const today = new Date();
      today.setHours(0, 0, 0, 0); 
      
      const upcomingEvent = scheduleEvents.find(ev => new Date(ev.date) >= today);
      
      if (upcomingEvent) {
        const upcomingDate = new Date(upcomingEvent.date);
        currentDate = new Date(upcomingDate.getFullYear(), upcomingDate.getMonth(), 1);
      } else {
        currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
      }

      if (currentDate.getFullYear() < 2026 || (currentDate.getFullYear() === 2026 && currentDate.getMonth() < 4)) {
        currentDate = new Date(2026, 4, 1);
      }
    }

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById('calendarYearMonth').textContent = `${year}.${String(month + 1).padStart(2, '0')}`;

    const prevBtn = document.querySelector('.calendar-nav-btn[onclick="prevMonth()"]');
    if (year <= 2026 && month <= 4) {
      prevBtn.style.visibility = 'hidden';
    } else {
      prevBtn.style.visibility = 'visible';
    }

    const firstDayIndex = new Date(year, month, 1).getDay(); 
    const totalDays = new Date(year, month + 1, 0).getDate(); 

    const calendarBody = document.getElementById('calendarBody');
    calendarBody.innerHTML = '';

    let dateCounter = 1;
    let html = '';

    let adjustedFirstDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

    for (let i = 0; i < 6; i++) {
      let rowHtml = '<tr>';
      let addedAnyDay = false;

      for (let j = 0; j < 7; j++) {
        const gridIndex = i * 7 + j;
        if (gridIndex < adjustedFirstDay || dateCounter > totalDays) {
          rowHtml += '<td></td>';
        } else {
          const currentDayStr = `${year}/${String(month + 1).padStart(2, '0')}/${String(dateCounter).padStart(2, '0')}`;
          
          const dayEvents = scheduleEvents.filter(ev => {
            const evDate = new Date(ev.date);
            return evDate.getFullYear() === year && evDate.getMonth() === month && evDate.getDate() === dateCounter;
          });

          let eventsHtml = '';
          dayEvents.forEach(ev => {
            let catClass = 'cat-live'; 
            if (ev.title.includes('記念') || ev.title.includes('誕生日')) catClass = 'cat-anniv'; 
            if (ev.title.includes('TikTok') || ev.title.includes('配信')) catClass = 'cat-tiktok'; 

            let label = '';
            if (ev.title.includes('TikTok')) {
              label = 'TikTok個人配信';
            } else {
              if (ev.live && ev.live !== '終日' && ev.live !== '---') {
                label += `${ev.live.split('～')[0]} `;
              }
              
              let venueText = ev.venue;
              if (venueText === 'ONLINE' || !venueText || venueText.trim() === '' || venueText === '---' || venueText === '-') {
                venueText = ev.title;
              }
              label += venueText;
            }

            eventsHtml += `<a class="event-item ${catClass}" onclick="openEventDetails(event, '${encodeURIComponent(JSON.stringify(ev))}')">${label}</a>`;
          });

          rowHtml += `<td>
            <div class="date-num">${dateCounter}</div>
            ${eventsHtml}
          </td>`;
          dateCounter++;
          addedAnyDay = true;
        }
      }
      rowHtml += '</tr>';
      if (addedAnyDay) {
        html += rowHtml;
      }
    }
    calendarBody.innerHTML = html;
  }

  function prevMonth() {
    if (currentDate.getFullYear() < 2026 || (currentDate.getFullYear() === 2026 && currentDate.getMonth() <= 4)) return;
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  }

  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  }

  function goToToday() {
    currentDate = new Date();
    if (currentDate.getFullYear() < 2026 || (currentDate.getFullYear() === 2026 && currentDate.getMonth() < 4)) {
      currentDate = new Date(2026, 4, 1);
    }
    renderCalendar();
  }

  function openEventDetails(event, encodedData) {
    event.stopPropagation();
    const ev = JSON.parse(decodeURIComponent(encodedData));

    const isBirthday = ev.title === '誕生日';
    const isTikTok = ev.title.includes('TikTok');

    const groupVenue = document.getElementById('groupVenue');
    const groupOpenStart = document.getElementById('groupOpenStart');
    const groupLive = document.getElementById('groupLive');
    const groupTokuten = document.getElementById('groupTokuten');
    const groupBonus = document.getElementById('groupBonus');
    const groupTicket = document.getElementById('groupTicket');
    const ticketLabel = document.getElementById('ticketLabel');
    const titleEl = document.getElementById('modalTitle');

    groupVenue.style.display = 'block';
    groupOpenStart.style.display = 'block';
    groupLive.style.display = 'block';
    groupTokuten.style.display = 'block';
    groupBonus.style.display = 'block';
    groupTicket.style.display = 'block';
    ticketLabel.textContent = "チケットURL";

    if (isBirthday) {
      titleEl.innerHTML = `<span style="color: var(--main-pink); font-size: 16px; display: block; margin-bottom: 5px;">🎂 Happy Birthday 🎂<br>お誕生日おめでとう🎉</span>`;
      groupVenue.style.display = 'none';
      groupOpenStart.style.display = 'none';
      groupLive.style.display = 'none';
      groupTokuten.style.display = 'none';
      groupBonus.style.display = 'none';
      groupTicket.style.display = 'none';
    } else if (isTikTok) {
      titleEl.textContent = ev.title; 
      groupVenue.style.display = 'none';
      groupOpenStart.style.display = 'none';
      groupTokuten.style.display = 'none';
      groupBonus.style.display = 'none';
      
      document.getElementById('modalLive').textContent = ev.live || "木曜定期配信。時間はSNSで告知";
      
      ticketLabel.textContent = "配信URL";
      const ticketArea = document.getElementById('modalTicketArea');
      ticketArea.innerHTML = `<a href="https://www.tiktok.com/@amunyan__" target="_blank" style="color: var(--main-pink); text-decoration: underline; word-break: break-all;">https://www.tiktok.com/@amunyan__</a>`;
    } else {
      titleEl.textContent = ev.title;
      document.getElementById('modalVenue').textContent = ev.venue || '-';
      document.getElementById('modalOpenStart').textContent = ev.openStart || '-';
      document.getElementById('modalLive').textContent = ev.live || '-';
      document.getElementById('modalTokuten').textContent = ev.tokuten || '-';
      document.getElementById('modalBonus').textContent = ev.nyujoTokuten || '-';

      const ticketArea = document.getElementById('modalTicketArea');
      const hasLink = ev.link && ev.link.trim() !== '' && ev.link.trim() !== '#' && ev.link.trim() !== 'undefined';
      if (hasLink) {
        const cleanLink = ev.link.trim();
        ticketArea.innerHTML = `<a href="${cleanLink}" target="_blank" style="color: var(--main-pink); text-decoration: underline; word-break: break-all;">${cleanLink}</a>`;
        groupTicket.style.display = 'block'; 
      } else {
        groupTicket.style.display = 'none';
      }
    }

    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal(event) {
    if (event.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('active');
    }
  }

  function forceCloseModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  async function loadCommonHeader() {
    try {
      const response = await fetch('header.html');
      if (!response.ok) throw new Error('Header load failed');
      const html = await response.text();
      
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;

      const footerElement = tempDiv.querySelector('#sharedFooter');
      if (footerElement) {
        footerElement.parentNode.removeChild(footerElement);
        const footerContainer = document.getElementById('footer-container');
        if (footerContainer) {
          footerContainer.appendChild(footerElement);
        }
      }

      document.getElementById('common-header-container').innerHTML = tempDiv.innerHTML;
      
      initMenu();
    } catch (error) {
      console.warn('共通メニューの読み込みに失敗しました。');
    }
  }

  function initMenu() {
    const hamburger = document.getElementById('hamburger');
    const globalNav = document.getElementById('globalNav');
    const siteLogo = document.getElementById('siteLogo');
    const navLinks = document.querySelectorAll('.nav-list a');

    if (!hamburger || !globalNav) return;

    function toggleMenu() {
      hamburger.classList.toggle('active');
      globalNav.classList.toggle('active');
      
      if (siteLogo) siteLogo.style.color = 'var(--bg-white)';

      document.body.classList.toggle('no-scroll');
    }

    hamburger.addEventListener('click', toggleMenu);

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        const targetId = link.getAttribute('href');
        
        if (targetId.startsWith('#') || targetId.includes('#')) {
          const hash = targetId.substring(targetId.indexOf('#'));
          const targetElement = document.querySelector(hash);
          
          if (targetElement) {
            e.preventDefault(); 
            if(globalNav.classList.contains('active')) {
              toggleMenu();
            }
            
            setTimeout(() => {
              const headerElement = document.getElementById('header');
              const headerHeight = headerElement ? headerElement.offsetHeight : 60;
              const targetPos = targetElement.getBoundingClientRect().top + window.scrollY - headerHeight;
              
              window.scrollTo({
                top: targetPos,
                behavior: 'smooth'
              });
            }, 400); 
          }
        } else {
          if(globalNav.classList.contains('active')) {
            toggleMenu();
          }
        }
      });
    });
  }

  function initCrayonCountdown() {
    const targetDate = new Date(2026, 10, 17, 0, 0, 0).getTime();
    const daysEl = document.getElementById('crayonDays');
    const wrapperEl = document.getElementById('crayonCountdown');

    if (!daysEl || !wrapperEl) return;

    function update() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        wrapperEl.style.display = 'none';
        return;
      }
      const days = Math.ceil(distance / (1000 * 60 * 60 * 24));
      daysEl.textContent = days;
    }
    
    update();
    setInterval(update, 1000 * 60 * 60); 
  }

  // ==================================================
  // ゲームロジック：倍率の二段階進化 ＆ プレビュー対応
  // ==================================================
  function initGame() {
    const oshiBtn = document.getElementById('oshiBtn');
    const canvas = document.getElementById('oshiCanvas');
    const ctx = canvas ? canvas.getContext('2d') : null;
    const totalCounter = document.getElementById('totalCounter');
    const comboCounter = document.getElementById('comboCounter');
    const venueText = document.getElementById('venueText'); 
    const gameArea = document.getElementById('gameArea');
    const heroSection = document.getElementById('hero');

    if (!oshiBtn) return;

    // --- 画像のプリロードとCanvas描画ロジック ---
    const oshiImages = {};
    for (let i = 1; i <= 18; i++) {
      const numStr = String(i).padStart(2, '0');
      const key = `am_${numStr}`;
      const img = new Image();
      img.src = `/game/${key}.png`;
      oshiImages[key] = img;
    }

    if (canvas) {
      canvas.width = 800;
      canvas.height = 800;
    }

    // Canvasへの描画関数 (プレビュー時の画像未発見フォールバック対応)
    function drawOshiCanvas(imageKey, comboCount) {
      if (!ctx) return;
      const img = oshiImages[imageKey];
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      // ★ スケール（倍率）と位置（Y軸降下）の計算
      const minScaleVal = 1.5;        
      const midScaleVal = 4.0;
      const maxScaleVal = 10.0; // 100コンボで最大10倍化
      
      let currentDrawScale = minScaleVal;
      let shiftY = 0;

      if (comboCount <= 30) {
        currentDrawScale = minScaleVal + ((midScaleVal - minScaleVal) * (comboCount / 30));
        shiftY = 120 * (comboCount / 30); // 30コンボまでは動かさない（今の動き）
      } else if (comboCount <= 100) {
        currentDrawScale = midScaleVal + ((maxScaleVal - midScaleVal) * ((comboCount - 30) / 70));
        shiftY = 120 + (230 * ((comboCount - 30) / 70));
      } else {
        currentDrawScale = maxScaleVal;
        shiftY = 350;
      }

      // ▼画像がないプレビュー環境用の代役を描画▼
      if (!img || !img.complete || img.naturalWidth === 0) {
        ctx.fillStyle = 'rgba(255, 42, 122, 0.7)'; 
        ctx.beginPath();
        // 常に一定のサイズで描画 (拡大はCSS側で行うため)
        const radius = w * 0.35;
        ctx.arc(w/2, h/2, radius, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('NO IMAGE', w/2, h/2);
        
        // カラーセロハン効果
        if (comboCount > 0) {
           let colorRatio = Math.min(comboCount / 30, 1.0);
           let opacity = 0.20; 
           const greenValue = Math.floor(255 * (1 - colorRatio));
           ctx.globalCompositeOperation = 'source-atop';
           ctx.fillStyle = `rgba(255, ${greenValue}, 0, ${opacity})`;
           ctx.fillRect(0, 0, w, h);
           ctx.globalCompositeOperation = 'source-over';
        }
        return;
      }
      
      // ▼通常環境での画像描画▼
      // 画像自体は常にキャンバス領域(800x800)に収まるように描画する
      const baseScale = Math.min(w / img.width, h / img.height);
      const drawW = img.width * baseScale;
      const drawH = img.height * baseScale;
      const drawX = (w - drawW) / 2;
      const drawY = (h - drawH) / 2;

      ctx.globalCompositeOperation = 'source-over';
      ctx.drawImage(img, drawX, drawY, drawW, drawH);

      // カラーセロハン効果 (染まり具合20%上限)
      if (comboCount > 0) {
        let colorRatio = Math.min(comboCount / 30, 1.0); 
        let opacity = (comboCount <= 30) ? 0.20 * colorRatio : 0.20; 
        const greenValue = Math.floor(255 * (1 - colorRatio));
        
        ctx.globalCompositeOperation = 'source-atop';
        ctx.fillStyle = `rgba(255, ${greenValue}, 0, ${opacity})`;
        ctx.fillRect(0, 0, w, h);
      }
    }

    // 初期画像の表示
    oshiImages['am_01'].onload = () => {
      drawOshiCanvas('am_01', 0);
    };
    setTimeout(() => drawOshiCanvas('am_01', 0), 200);

    // --- Firebase 接続ロジック ---
    let totalAudienceRef = null;
    let serverTotalAudience = 0; 
    let pendingAudience = 0;     

    if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey && firebaseConfig.apiKey !== "ここに本物のAPIキーを書いてください") {
      try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        totalAudienceRef = database.ref('total_audience');

        totalAudienceRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data !== null) {
            serverTotalAudience = parseInt(data, 10);
            updateAudienceDisplay();
          }
        });
      } catch (e) {
        console.error("Firebase初期化エラー:", e);
      }
    } else {
      serverTotalAudience = 0;
      setTimeout(() => { updateAudienceDisplay(); }, 100);
    }

    setInterval(() => {
      if (pendingAudience > 0 && totalAudienceRef) {
        const sendCount = pendingAudience;
        totalAudienceRef.set(firebase.database.ServerValue.increment(sendCount))
          .then(() => {
            pendingAudience -= sendCount;
            updateAudienceDisplay();
          })
          .catch((error) => console.error("Firebase送信エラー:", error));
      }
    }, 5000); 

    document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });

    let combo = 0;
    let lastClickTime = 0;
    let tapHistory = [];
    const MAX_TAPS_PER_SECOND = 8; 

    const minScale = 1.5;        
    const midScale = 4.0;
    const maxScale = 10.0; // 100コンボで最大10倍        
    let currentScale = minScale; 

    const minFontSize = 3.5;     
    const maxFontSize = 8.0;     

    const phrases_1_30 = ["ありがとう！", "うれしい！", "ニヤリ！", "いいねありがとう！", "周年ライブきて！", "ハートありがと！"];
    const phrases_10_30 = ["ハイスピ10周年ライブ", "11/17！渋谷！", "WWWXであります！", "絶対に来てください！", "今すぐメモ！"];
    const phrases_31_plus = ["11/17！11/17！", "2026年11月17日！", "あむちゃんリアバ1か月前！", "渋谷WWWX", "周年！WWWX", "ハイスピ10周年ライブ", "もちろん来るよね？"];
    const phrases_50_plus = ["いちいちいちなな！", "今すぐ予定をあけろ！", "周年もリアバも予定あける！", "来なかったら××！", "絶対来るよなオマエら！？", "わかった？わわかってるよな？"];

    function getVenue(clicks) {
      if (clicks < 50) return "目標：路上ライブ（50人）";
      if (clicks < 300) return "目標：渋谷 VIDENT（300人）";
      if (clicks < 600) return "目標：渋谷 WWW X（600人）";
      if (clicks < 700) return "目標：渋谷 duo（700人）";
      if (clicks < 1500) return "目標：Zepp Shinjuku（1,500人）";
      if (clicks < 2500) return "目標：Zepp DiverCity（2,500人）";
      if (clicks < 5000) return "目標：東京国際フォーラム（5,000人）";
      if (clicks < 8000) return "目標：東京ガーデンシアター（8,000人）";
      if (clicks < 14000) return "目標：日本武道館（1.4万人）";
      if (clicks < 30000) return "目標：さいたまスーパーアリーナ（3万人）";
      if (clicks < 55000) return "目標：東京ドーム（5.5万人）";
      if (clicks < 80000) return "目標：国立競技場（8万人）";
      if (clicks < 200000) return "目標：渋谷エリア（20万人）";
      if (clicks < 300000) return "目標：6大ドームツアー（30万人）";
      if (clicks < 1000000) return "目標：東京ドーム20回公演（100万人）";
      if (clicks < 3000000) return "目標：6大ドームツアー10周（300万人）";
      if (clicks < 10000000) return "目標：東京23区エリア（1,000万人）";
      if (clicks < 120000000) return "目標：47都道府県ツアー（1.2億人）";
      if (clicks < 8300000000) return "目標：地球（83億人）";
      return "👑 地球到達!!（83億人） 👑";
    }

    function getPhrases(currentCombo) {
      let currentPhrases = [];
      if (currentCombo <= 30) {
        currentPhrases = currentPhrases.concat(phrases_1_30);
        if (currentCombo >= 10) currentPhrases = currentPhrases.concat(phrases_10_30);
      } else {
        currentPhrases = currentPhrases.concat(phrases_31_plus);
        if (currentCombo >= 50) currentPhrases = currentPhrases.concat(phrases_50_plus);
      }
      return currentPhrases;
    }

    function getRandomOshiImage(currentCombo) {
      if (currentCombo === 0) return 'am_01.png';
      let min, max;
      if (currentCombo <= 30) {
        min = 1; max = 9;
      } else {
        min = 10; max = 18;
      }
      const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
      const paddedNum = String(randomNum).padStart(2, '0');
      return `am_${paddedNum}.png`;
    }

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function playVoice(level) {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const baseFreq = level === 1 ? 400 : level === 2 ? 600 : 800;
      osc.frequency.value = baseFreq + Math.random() * 300; 
      osc.type = level === 3 ? 'square' : 'triangle';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function updateAudienceDisplay() {
      const currentVisualTotal = serverTotalAudience + pendingAudience;
      totalCounter.textContent = `動員: ${currentVisualTotal.toLocaleString()}`;
      venueText.textContent = getVenue(currentVisualTotal);
    }

    let currentLevel = 1;
    let tapGuideTimer = null; 

    oshiBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const now = Date.now();

      if (now - lastClickTime < 50) return; 

      tapHistory = tapHistory.filter(t => now - t < 1000);
      if (tapHistory.length >= MAX_TAPS_PER_SECOND) return;

      tapHistory.push(now);

      oshiBtn.classList.remove('resetting');
      venueText.classList.add('hidden');
      
      clearTimeout(tapGuideTimer);
      const tapGuide = document.getElementById('tapGuide');
      if (tapGuide) {
        tapGuide.style.animation = 'none';
        tapGuide.style.opacity = '0';
      }

      if (now - lastClickTime < 1000) combo++; else combo = 1; 
      lastClickTime = now;

      pendingAudience++;
      if (!totalAudienceRef) {
        serverTotalAudience++;
        pendingAudience = 0;
      }
      updateAudienceDisplay();

      // Canvasへ描画
      const newImageSrc = getRandomOshiImage(combo);
      const match = newImageSrc.match(/am_(\d+)\.png/);
      const imageKey = match ? `am_${match[1]}` : 'am_01';
      drawOshiCanvas(imageKey, combo);

      let colorRatio = 0;
      let shiftY = 0;

      if (combo <= 30) {
        currentScale = minScale + ((midScale - minScale) * (combo / 30));
        colorRatio = combo / 30; 
        shiftY = 120 * colorRatio; 
      } else if (combo <= 100) {
        currentScale = midScale + ((maxScale - midScale) * ((combo - 30) / 70));
        colorRatio = 1.0; 
        shiftY = 120 + (230 * ((combo - 30) / 70));
      } else {
        currentScale = maxScale;
        colorRatio = 1.0;
        shiftY = 350;
      }

      const greenValue = Math.floor(255 * (1 - colorRatio)); 
      oshiBtn.style.setProperty('--aura-color', `rgb(255, ${greenValue}, 0)`);
      
      let blurValue = (combo > 0) ? 10 + (20 * colorRatio) : 0;
      oshiBtn.style.setProperty('--shadow-blur', `${blurValue}px`);

      oshiBtn.style.transform = `translateZ(0) translateY(${shiftY}px) scale(${currentScale - 0.15})`;
      
      setTimeout(() => {
        oshiBtn.style.transform = `translateZ(0) translateY(${shiftY}px) scale(${currentScale})`;
      }, 50);

      if (combo > 30) {
        currentLevel = 3; heroSection.className = 'hero level-3';
      } else if (combo > 10) {
        currentLevel = 2; heroSection.className = 'hero level-2';
      } else {
        currentLevel = 1; heroSection.className = 'hero';
      }

      comboCounter.textContent = combo > 1 ? `${combo} COMBO!!` : '';

      playVoice(currentLevel);
      createFloatingText(currentLevel, combo);
    });

    function createFloatingText(level, currentCombo) {
      const existingTexts = document.querySelectorAll('.floating-text');
      if (existingTexts.length > 35) existingTexts[0].remove();

      const textEl = document.createElement('div');
      textEl.className = 'floating-text';
      
      const currentPhrases = getPhrases(currentCombo);
      textEl.textContent = currentPhrases[Math.floor(Math.random() * currentPhrases.length)];

      let fontSize = (currentCombo <= 30) 
        ? minFontSize + ((maxFontSize - minFontSize) * (currentCombo / 30))
        : maxFontSize;
      textEl.style.fontSize = `${fontSize}cqw`;

      const randomOffsetX = (Math.random() - 0.5) * 60; 
      textEl.style.left = `calc(50% + ${randomOffsetX}cqw)`;
      
      let angle, randomOffsetY, travelY;
      if (currentCombo > 30) {
        angle = (Math.random() - 0.5) * 50; 
        randomOffsetY = (Math.random() - 0.5) * 60; 
        textEl.style.top = `calc(45% + ${randomOffsetY}cqw)`; 
        travelY = 15 + Math.random() * 25; 
      } else {
        angle = (Math.random() - 0.5) * 20; 
        randomOffsetY = (Math.random() - 0.5) * 40; 
        textEl.style.top = `calc(25% + ${randomOffsetY}cqw)`; 
        travelY = 25; 
      }

      textEl.style.setProperty('--angle', `${angle}deg`);
      textEl.style.setProperty('--travel-y', `${travelY}cqw`);

      gameArea.appendChild(textEl);
      setTimeout(() => { if (textEl.parentNode) textEl.remove(); }, 1000);
    }

    setInterval(() => {
      if (combo > 0 && Date.now() - lastClickTime >= 1000) {
        combo = 0;
        currentLevel = 1;
        currentScale = minScale; 
        
        comboCounter.textContent = '';
        heroSection.className = 'hero'; 
        
        venueText.classList.remove('hidden');

        drawOshiCanvas('am_01', 0);

        oshiBtn.classList.add('resetting');
        oshiBtn.style.transform = `translateZ(0) translateY(0px) scale(${minScale})`; 
        oshiBtn.style.setProperty('--shadow-blur', '0px');

        tapGuideTimer = setTimeout(() => {
          const tapGuide = document.getElementById('tapGuide');
          if (tapGuide) {
            tapGuide.style.animation = 'pulse-tap 1.2s infinite';
            tapGuide.style.opacity = '1';
          }
        }, 2500);
      }
    }, 100);
  }

  // ==================================================
  // ==================================================
  window.addEventListener('load', () => {
    loadCommonHeader(); 
    loadScheduleFromCSV();
    initCrayonCountdown(); 
    initGame(); 

    const loading = document.getElementById('loading');
    const body = document.body;
    setTimeout(() => {
      loading.classList.add('loaded');
      body.classList.remove('no-scroll');

      if (window.location.hash) {
        setTimeout(() => {
          const targetElement = document.querySelector(window.location.hash);
          if (targetElement) {
            const headerElement = document.getElementById('header');
            const headerHeight = headerElement ? headerElement.offsetHeight : 60;
            const targetPos = targetElement.getBoundingClientRect().top + window.scrollY - headerHeight;
            window.scrollTo({
              top: targetPos,
              behavior: 'smooth'
            });
          }
        }, 100);
      }
    }, 1000);
  });

  window.addEventListener('scroll', () => {
    const header = document.getElementById('header');
    if (!header) return; 
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });
</script>
