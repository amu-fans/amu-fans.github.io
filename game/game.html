<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>あむちゃん告知くりっかー</title>
  <style>
    :root {
      --main-pink: #ff2a7a;
      --bg-color: #111;
      --text-color: #fff;
    }

    /* 画面全体のスクロール・ズームを完全にロックする設定 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh; 
      overflow: hidden;
      position: fixed; 
      top: 0;
      left: 0;
      /* 【強力なロック】ブラウザのズームやスワイプ動作を完全に無効化 */
      touch-action: none; 
      -webkit-touch-callout: none; /* 長押しメニューの禁止 */
    }

    body {
      background-color: #050505; 
      color: var(--text-color);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none; 
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent; 
    }

    .game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
      /* 【変更】アスペクト比を 2:3 に変更（横に少しゆとりが出る黄金比） */
      max-width: calc(100dvh * 2 / 3);
      max-height: calc(100vw * 3 / 2);
      aspect-ratio: 2 / 3;
      
      background-image: url('bg_img.jpg');
      background-size: cover;
      background-position: center;
      background-color: var(--bg-color); 
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); 
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden; 
      container-type: inline-size;
      touch-action: none; /* 念押しでコンテナ内もジェスチャー禁止 */
    }

    .counter-area {
      margin-top: 8cqw; 
      text-align: center;
      z-index: 10;
    }

    .total-clicks {
      font-size: 6.5cqw; 
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 42, 122, 0.5);
    }

    .combo-text {
      font-size: 4.5cqw; 
      font-weight: bold;
      color: #44ff44;
      height: 7cqw; 
      margin-top: 1cqw;
      transition: color 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-area {
      position: relative;
      flex: 1;
      width: 100%;
    }

    .oshi-wrapper {
      position: absolute;
      left: 50%;
      top: 50%; 
      transform: translate(-50%, -50%);
      transform-origin: center center;
      z-index: 5;
    }

    .oshi-shaker {
      display: flex;
      justify-content: center;
      align-items: center;
      transform-origin: center center;
    }

    .oshi-button {
      position: relative;
      width: 45cqw;
      height: 45cqw;
      background-image: url('oshi_img.png');
      background-size: contain; 
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent; 
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transform: translateZ(0) translateY(0cqw) scale(1.5);
      transform-origin: center center;
      will-change: transform;
      z-index: 2;
    }

    /* 【軽量・マイルド発光】タップした瞬間の「白フラッシュ」用レイヤー */
    .oshi-button::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      
      -webkit-mask-image: url('oshi_img.png');
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-image: url('oshi_img.png');
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      
      background-color: #ffffff; 
      opacity: 0; 
      
      mix-blend-mode: screen;
      pointer-events: none;
      transition: opacity 0.05s ease-out; 
      will-change: opacity;
      z-index: 3; 
    }

    /* 発光度合い10%（ごく僅かなマイルド発光） */
    .oshi-button.clicked::before {
      opacity: 0.1; 
    }

    /* 【新設・超軽量】キャラの色を変える「切り抜きカラーセロハン」レイヤー */
    .oshi-button::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      
      -webkit-mask-image: url('oshi_img.png');
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-image: url('oshi_img.png');
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      
      mix-blend-mode: overlay; 
      
      background-color: var(--aura-color, rgb(255, 255, 0));
      opacity: var(--aura-opacity, 0); 
      
      pointer-events: none; 
      transition: background-color 0.1s, opacity 0.1s; 
      will-change: background-color, opacity; 
    }

    /* コンボテキストの色変化 */
    body.level-2 .combo-text {
      color: #ffaa00;
    }

    /* レベル3の激しい揺れ */
    body.level-3 .oshi-shaker {
      animation: shake 0.2s infinite; 
      will-change: transform; 
    }
    body.level-3 .combo-text {
      color: #ff0000;
      animation: shake 0.1s infinite;
    }

    /* 吹き出しのスタイル */
    .floating-text {
      position: absolute;
      font-weight: bold;
      color: #fff;
      text-shadow: 
        -0.3cqw -0.3cqw 0 #000,  
         0.3cqw -0.3cqw 0 #000,
        -0.3cqw  0.3cqw 0 #000,
         0.3cqw  0.3cqw 0 #000;
      pointer-events: none; 
      white-space: nowrap; 
      z-index: 20;
      opacity: 1;
      animation: floatUp 1s ease-out forwards;
      will-change: transform, opacity; 
    }

    @keyframes floatUp {
      0% {
        transform: translate(-50%, -50%) rotate(var(--angle, 0deg));
        opacity: 1;
      }
      100% {
        transform: translate(-50%, calc(-50% - 25cqw)) rotate(var(--angle, 0deg));
        opacity: 0;
      }
    }

    @keyframes shake {
      0% { transform: translate(0.2cqw, 0.2cqw) rotate(0deg); }
      10% { transform: translate(-0.2cqw, -0.4cqw) rotate(-1deg); }
      20% { transform: translate(-0.5cqw, 0px) rotate(1deg); }
      30% { transform: translate(0.5cqw, 0.4cqw) rotate(0deg); }
      40% { transform: translate(0.2cqw, -0.2cqw) rotate(1deg); }
      50% { transform: translate(-0.2cqw, 0.4cqw) rotate(-1deg); }
      60% { transform: translate(-0.5cqw, 0.2cqw) rotate(0deg); }
      70% { transform: translate(0.5cqw, 0.2cqw) rotate(-1deg); }
      80% { transform: translate(-0.2cqw, -0.2cqw) rotate(1deg); }
      90% { transform: translate(0.2cqw, 0.4cqw) rotate(0deg); }
      100% { transform: translate(0.2cqw, -0.4cqw) rotate(-1deg); }
    }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="counter-area">
      <div class="total-clicks" id="totalCounter">動員: 0</div>
      <div class="combo-text" id="comboCounter"></div>
    </div>

    <div class="game-area" id="gameArea">
      <div class="oshi-wrapper" id="oshiWrapper">
        <div class="oshi-shaker" id="oshiShaker">
          <div class="oshi-button" id="oshiBtn"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // iOS Safari等のダブルタップズームをJS側からも念押しでブロック
    document.addEventListener('dblclick', function(e) {
      e.preventDefault();
    }, { passive: false });

    let totalClicks = 0;
    let combo = 0;
    let lastClickTime = 0;
    let currentLevel = 1;
    
    const minScale = 1.5;        
    const maxScale = 7.0;        
    const maxComboForScale = 30; 
    let currentScale = minScale; 

    const minFontSize = 3.5;     
    const maxFontSize = 10.5;    

    const oshiBtn = document.getElementById('oshiBtn');
    const totalCounter = document.getElementById('totalCounter');
    const comboCounter = document.getElementById('comboCounter');
    const gameArea = document.getElementById('gameArea');

    const phrases_1_30 = [
      "ありがとう！", "うれしい！", "ニヤリ！", "いいねありがとう！", "周年ライブきて！", "ハートありがと！"
    ];
    const phrases_10_30 = [
      "ハイスピ10周年ライブ", "11/17！渋谷！", "WWWXであります！", "絶対に来てください！", "今すぐメモ！"
    ];
    const phrases_31_plus = [
      "11/17！11/17！", "2026年11月17日！", "あむちゃんリアバ1か月前！", "渋谷WWWX", "周年！WWWX", "ハイスピ10周年ライブ", "もちろん来るよね？"
    ];
    const phrases_50_plus = [
      "いちいちいちなな！", "今すぐ予定をあけろ！", "周年もリアバも予定あける！", "来なかったら××！", "絶対来るよなオマエら！？", "わかった？わかってるよな？"
    ];

    function getPhrases(combo) {
      let currentPhrases = [];
      if (combo <= 30) {
        currentPhrases = currentPhrases.concat(phrases_1_30);
        if (combo >= 10) {
          currentPhrases = currentPhrases.concat(phrases_10_30);
        }
      } else {
        currentPhrases = currentPhrases.concat(phrases_31_plus);
        if (combo >= 50) {
          currentPhrases = currentPhrases.concat(phrases_50_plus);
        }
      }
      return currentPhrases;
    }

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playVoice(level) {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      const baseFreq = level === 1 ? 400 : level === 2 ? 600 : 800;
      osc.frequency.value = baseFreq + Math.random() * 300; 
      
      osc.type = level === 3 ? 'square' : 'triangle';

      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function createFloatingText(level, currentCombo) {
      const existingTexts = document.querySelectorAll('.floating-text');
      if (existingTexts.length > 30) {
        existingTexts[0].remove();
      }

      const textEl = document.createElement('div');
      textEl.className = 'floating-text';
      
      const currentPhrases = getPhrases(currentCombo);
      textEl.textContent = currentPhrases[Math.floor(Math.random() * currentPhrases.length)];

      let fontSize;
      if (currentCombo <= maxComboForScale) {
        fontSize = minFontSize + ((maxFontSize - minFontSize) * (currentCombo / maxComboForScale));
      } else {
        fontSize = maxFontSize;
      }
      textEl.style.fontSize = `${fontSize}cqw`;

      const randomOffsetX = (Math.random() - 0.5) * 60; 
      textEl.style.left = `calc(50% + ${randomOffsetX}cqw)`;
      
      const randomOffsetY = (Math.random() - 0.5) * 40; 
      textEl.style.top = `calc(25% + ${randomOffsetY}cqw)`; 

      const angle = (Math.random() - 0.5) * 20;
      textEl.style.setProperty('--angle', `${angle}deg`);

      gameArea.appendChild(textEl);

      setTimeout(() => {
        if (textEl.parentNode) {
          textEl.remove();
        }
      }, 1000);
    }

    oshiBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault(); 

      const now = Date.now();
      
      if (now - lastClickTime < 1000) {
        combo++;
      } else {
        combo = 1; 
      }
      lastClickTime = now;
      totalClicks++;

      if (combo <= maxComboForScale) {
        currentScale = minScale + ((maxScale - minScale) * (combo / maxComboForScale));
      } else {
        currentScale = maxScale;
      }

      const colorRatio = Math.min(combo / maxComboForScale, 1.0); 
      
      const maxShiftY = 35; 
      const shiftY = maxShiftY * colorRatio;
      
      const greenValue = Math.floor(255 * (1 - colorRatio)); 
      oshiBtn.style.setProperty('--aura-color', `rgb(255, ${greenValue}, 0)`);
      
      const opacityValue = 0.4 * colorRatio;
      oshiBtn.style.setProperty('--aura-opacity', opacityValue);

      oshiBtn.style.transform = `translateZ(0) translateY(${shiftY}cqw) scale(${currentScale - 0.15})`;
      oshiBtn.classList.add('clicked');
      
      setTimeout(() => {
        oshiBtn.style.transform = `translateZ(0) translateY(${shiftY}cqw) scale(${currentScale})`;
        oshiBtn.classList.remove('clicked');
      }, 50);

      if (combo > 30) {
        currentLevel = 3;
        document.body.className = 'level-3';
      } else if (combo > 10) {
        currentLevel = 2;
        document.body.className = 'level-2';
      } else {
        currentLevel = 1;
        document.body.className = '';
      }

      totalCounter.textContent = `動員: ${totalClicks}`;
      comboCounter.textContent = combo > 1 ? `${combo} COMBO!!` : '';

      playVoice(currentLevel);
      createFloatingText(currentLevel, combo);
    });

    setInterval(() => {
      if (combo > 0 && Date.now() - lastClickTime > 1000) {
        combo = 0;
        currentLevel = 1;
        currentScale = minScale; 
        
        comboCounter.textContent = '';
        document.body.className = '';
        oshiBtn.style.transform = `translateZ(0) scale(${currentScale})`; 
        
        oshiBtn.style.setProperty('--aura-color', `rgb(255, 255, 0)`);
        oshiBtn.style.setProperty('--aura-opacity', 0);
      }
    }, 100);

  </script>
</body>
</html>
